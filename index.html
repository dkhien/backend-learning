annotation and observe how it changes query behaviour.","code":"@OneToMany(mappedBy = \"account\", fetch = FetchType.LAZY)\nprivate List<Transaction> transactions;\n// LAZY = load only when accessed (default, causes N+1 in loops)\n// EAGER = always load with parent (bad for large collections)\n// Fix: use JOIN FETCH or @EntityGraph where you need the relation","lang":"java"},{"text":"Try @EntityGraph as a cleaner alternative to @Query JOIN FETCH. When would you choose one over the other?","code":"@EntityGraph(attributePaths = {\"transactions\"})\nList<Account> findAll();","lang":"java","note":"@EntityGraph works with Spring Data method naming (no @Query needed). JOIN FETCH gives more control for complex conditions. Both generate a SQL JOIN — verify in the log."}],"hints":[{"label":"Detecting N+1 in production","body":"In pg_stat_statements: look for a parameterised query (WHERE id = $1) with very high 'calls' count and low 'mean_exec_time'. A query called 10 000 times averaging 2ms = 20 seconds of DB time per minute. That signature — high calls, low per-call time, high total — is the N+1 fingerprint in production."}],"solution":null}],"refs":[{"type":"Postgres docs","name":"Planner Statistics","url":"https://www.postgresql.org/docs/current/planner-stats.html","desc":"How pg_stats works and how to increase statistics targets for better estimates."},{"type":"HikariCP wiki","name":"About Pool Sizing","url":"https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing","desc":"The definitive guide. Read before touching maximum-pool-size in production."},{"type":"Baeldung","name":"Spring Data JPA and N+1","url":"https://www.baeldung.com/spring-hibernate-n1-problem","desc":"Detailed walkthrough of N+1 causes and all fix strategies in Spring."},{"type":"Tool","name":"pgMustard","url":"https://www.pgmustard.com/docs/explain","desc":"Visual EXPLAIN plan analyser — paste your output for instant readable breakdown."}],"checklist":["Demonstrated stale statistics causing wrong row estimates (estimate vs actual differ by 10×+)","Fixed bad estimates by running ANALYZE — confirmed plan changed","Can explain what autovacuum does and why table bloat accumulates without it","Used pg_stat_statements to find the top slow queries by total time","Reproduced HikariCP pool exhaustion and observed the exact timeout error","Applied the pool sizing formula — can explain why a small pool often outperforms a large one"]},{"id":"db-w4","num":"Week 4","module":"db","title":"Locking, Deadlocks & Isolation Levels","subtitle":"The most critical database week — financial transactions depend on getting this exactly right","hours":12,"tagClasses":["tag-db","tag-time"],"tagLabels":["DB Internals","~12 hours"],"ddia":{"chapter":"Chapter 7 — Transactions (all of it)","note":"This is the most important DDIA chapter for your role. Weak isolation levels, dirty reads, non-repeatable reads, write skew. The banking examples in this lab directly parallel Kleppmann's examples. Read all of Chapter 7 this week."},"objectives":["Reproduce a non-repeatable read anomaly under Read Committed isolation","Confirm that Repeatable Read prevents the same anomaly","Reliably produce a deadlock between two concurrent sessions","Detect a deadlock using pg_locks and pg_stat_activity","Fix a deadlock using consistent lock ordering","Explain all four isolation levels and what anomalies each prevents"],"diagram":{"type":"isolation","caption":"Isolation levels vs anomalies — what each level prevents","intro":"SQL defines four isolation levels that control what one transaction can see when other transactions are running concurrently. Getting this wrong in banking means reading a stale account balance, seeing a phantom row in a retry loop, or losing an update when two transactions modify the same record simultaneously. The table below maps each level to what it prevents — and the banking consequence of each choice."},"labs":[{"num":1,"title":"Demonstrate isolation level anomalies","goal":"Open two separate psql sessions (or two DBeaver tabs, each with their own connection). Follow the steps precisely — the ordering between sessions matters.","setup":{"desc":"Make sure account id=1 has a known balance.","steps":[{"code":"UPDATE accounts SET balance = 50000.00 WHERE id = 1;\nCOMMIT;","lang":"sql"}]},"explore":[{"text":"Session A — start a transaction and read the balance. Do NOT commit yet.","code":"-- Session A\nBEGIN;\nSELECT balance FROM accounts WHERE id = 1;\n-- Note the value: 50000.00","lang":"sql"},{"text":"Session B — update and commit while Session A's transaction is still open.","code":"-- Session B\nUPDATE accounts SET balance = 99999.99 WHERE id = 1;\nCOMMIT;","lang":"sql"},{"text":"Session A — read the same row again without closing the transaction. What value do you see?","code":"-- Session A (still in the same BEGIN block)\nSELECT balance FROM accounts WHERE id = 1;\nROLLBACK;","lang":"sql","note":"Under READ COMMITTED (Postgres default): you see 99999.99 — the value changed within your transaction. This is a non-repeatable read. It's a risk in multi-step banking operations."},{"text":"Repeat the experiment with REPEATABLE READ isolation. Start Session A with this instead:","code":"-- Session A with higher isolation\nBEGIN TRANSACTION ISOLATION LEVEL REPEATABLE READ;\nSELECT balance FROM accounts WHERE id = 1;\n-- (Run Session B's UPDATE and COMMIT again)\nSELECT balance FROM accounts WHERE id = 1;\nROLLBACK;","lang":"sql","note":"Under REPEATABLE READ: the second read still returns 50000.00. Your transaction sees a consistent snapshot from when it started. This is correct behaviour for a multi-step balance check."},{"text":"Research: what is a phantom read? Write a scenario using the transactions table where a phantom read could occur. Which isolation level prevents it?"}],"hints":[{"label":"When to use REPEATABLE READ in practice","body":"Most HTTP request handlers are a single short transaction that reads data once — READ COMMITTED is fine. Use REPEATABLE READ explicitly when: (1) you read a value, do calculations, then write based on the result in one transaction, (2) you need to produce a consistent report across multiple queries. For critical financial operations: set the isolation level explicitly per transaction rather than changing the server default."}],"solution":null},{"num":2,"title":"Reproduce, detect, and fix a deadlock","goal":"The most important lab in the database module. Deadlocks in banking payment flows are real and they happen in production. Follow these steps precisely — timing between sessions matters.","setup":{"desc":"Give both accounts a known balance.","steps":[{"code":"UPDATE accounts SET balance = 10000.00 WHERE id IN (1, 2);\nCOMMIT;","lang":"sql"}]},"explore":[{"text":"Session A — start a transfer from account 1 to account 2. Lock row 1, then PAUSE before locking row 2.","code":"-- Session A\nBEGIN;\nUPDATE accounts SET balance = balance - 500 WHERE id = 1;\n-- STOP HERE. Switch to Session B before continuing.","lang":"sql"},{"text":"Session B — start a competing transfer in the opposite direction. Lock row 2, then try to lock row 1.","code":"-- Session B\nBEGIN;\nUPDATE accounts SET balance = balance - 300 WHERE id = 2;\nUPDATE accounts SET balance = balance + 300 WHERE id = 1;\n-- This UPDATE hangs — it's waiting for Session A's lock on row 1.","lang":"sql"},{"text":"Session A — now try to lock row 2. This creates the circular wait.","code":"-- Session A (return here after Session B is waiting)\nUPDATE accounts SET balance = balance + 500 WHERE id = 2;\n-- Postgres detects the circular wait and kills one transaction.","lang":"sql","note":"One session receives ERROR: deadlock detected. Look at the full error message — it shows which transactions were involved and which locks they held."},{"text":"While a deadlock is pending (during step 3 before Postgres resolves it), inspect the lock state in a third session.","code":"-- Session C (separate connection)\nSELECT pid, wait_event_type, wait_event, state, left(query, 60) AS query\nFROM pg_stat_activity\nWHERE state != 'idle';\n\nSELECT locktype, relation::regclass, mode, granted, pid\nFROM pg_locks\nWHERE NOT granted;","lang":"sql"},{"text":"Design the fix: implement consistent lock ordering. Rewrite the transfer so both sessions always lock the lower account_id first. Verify no deadlock occurs.","code":"-- Fixed transfer — always lock lower id first\nBEGIN;\nSELECT id, balance\nFROM accounts\nWHERE id IN (1, 2)\nORDER BY id         -- consistent ordering prevents circular wait\nFOR UPDATE;\n\nUPDATE accounts SET balance = balance - 500 WHERE id = 1;\nUPDATE accounts SET balance = balance + 500 WHERE id = 2;\nCOMMIT;","lang":"sql","note":"Run two competing transfers concurrently. With consistent ordering, Session B waits for Session A rather than forming a cycle. No deadlock."}],"hints":[{"label":"Handling deadlocks in Spring Boot","body":"Postgres throws error code 40P01 (deadlock_detected). Spring translates this to CannotAcquireLockException. You can add retry logic with @Retryable(value = CannotAcquireLockException.class, maxAttempts = 3). But the better fix is consistent lock ordering — then deadlocks never happen in the first place. Retry logic is a safety net, not a substitute for correct locking."}],"solution":null}],"refs":[{"type":"Postgres docs","name":"Transaction Isolation","url":"https://www.postgresql.org/docs/current/transaction-iso.html","desc":"All four levels with Postgres-specific behaviour. Note: Read Uncommitted behaves as Read Committed in Postgres."},{"type":"Postgres docs","name":"Explicit Locking","url":"https://www.postgresql.org/docs/current/explicit-locking.html","desc":"SELECT FOR UPDATE, FOR SHARE, NOWAIT, SKIP LOCKED. SKIP LOCKED is the key pattern for banking job queues."},{"type":"DDIA","name":"Chapter 7 — Transactions","url":null,"desc":"Write skew and serialization anomalies. The doctors-on-call example parallels banking balance checks directly."}],"checklist":["Demonstrated non-repeatable read under READ COMMITTED with two live sessions","Confirmed REPEATABLE READ prevents the same anomaly","Reliably reproduced a deadlock and observed the error message","Inspected the deadlock in pg_locks before Postgres resolved it","Fixed the deadlock using consistent lock ordering — verified with concurrent test","Can explain all four isolation levels and their anomalies from memory"]}]},{"id":"java","title":"Java Performance","color":"#c87840","tagClass":"tag-java","icon":"☕","desc":"JVM internals, GC tuning, memory leak diagnosis, and thread pool mechanics. The skills to diagnose production performance incidents without guessing.","weeks":[{"id":"java-w5","num":"Week 5","module":"java","title":"JVM Internals & GC Tuning","subtitle":"Understand how the JVM manages memory and how GC pauses become API latency spikes","hours":11,"tagClasses":["tag-java","tag-time"],"tagLabels":["Java Performance","~11 hours"],"ddia":null,"objectives":["Label all JVM heap regions from memory: Eden, Survivor 0/1, Old Gen, Metaspace","Enable GC logging and read the output format accurately","Explain G1GC region-based collection and pause target mechanics","Compare G1GC vs ZGC pause times under identical load","Tune -Xms, -Xmx, and MaxGCPauseMillis for a banking service profile"],"diagram":{"type":"jvm","caption":"JVM heap regions and the object lifecycle","intro":"The JVM does not use one block of memory — it divides memory into distinct regions, each with different behaviour. The heap (Eden, Survivor, Old Gen) is GC-managed and is what -Xmx limits. But Metaspace, thread stacks, and direct buffers live outside the heap entirely. If you size a Kubernetes container based only on heap, the off-heap regions cause OOMKill. Understanding this layout is the foundation for everything in this week and the K8s resource tuning week."},"labs":[{"num":1,"title":"Enable GC logging and read what you see","goal":"Generate real GC events, then read and interpret the log line by line. No theory first — get data, then understand it.","setup":{"desc":"Use the banking-app created in Week 3. Add the /gc-stress endpoint and set JVM flags in your IDE run configuration.","steps":[{"text":"Add this endpoint to the banking-app (any @RestController class):","code":"@GetMapping(\"/gc-stress\")\npublic String gcStress() throws InterruptedException {\n    List<byte[]> list = new ArrayList<>();\n    for (int i = 0; i < 5000; i++) {\n        list.add(new byte[10_240]);\n        if (i % 500 == 0) {\n            list.clear();\n            Thread.sleep(5);\n        }\n    }\n    return \"done\";\n}","lang":"java"},{"text":"Set these JVM flags in IntelliJ → Run → Edit Configurations → VM Options:","code":"-Xms256m\n-Xmx512m\n-XX:+UseG1GC\n-Xlog:gc*:file=/tmp/gc.log:time,uptime,level,tags\n-XX:MaxGCPauseMillis=200","lang":"bash"}]},"explore":[{"text":"Call /gc-stress five times. Then open /tmp/gc.log and find a 'Pause Young (Normal)' event. Parse the format yourself before reading the hint.","note":"Look for lines containing 'Pause Young'. The format is: GC(N) event_type reason heap_before→heap_after(heap_max) pause_ms"},{"text":"Upload your GC log to gceasy.io and find a Full GC event if one exists. What triggered it? How much longer did it pause compared to Young GC?","code":"open https://gceasy.io","lang":"bash","note":"Full GC pauses the entire JVM. If your API has a 200ms timeout and GC takes 300ms, every in-flight request fails. That is the direct connection between GC and API latency."},{"text":"Answer in writing: if your banking service gets a 300ms Full GC pause and your downstream caller has a 500ms timeout, what is the user experience? How would you detect this in production logs?"},{"text":"Try adding -XX:+DisableExplicitGC to your flags. Call System.gc() explicitly in your endpoint. Does it still trigger a Full GC? Why does this flag matter for third-party libraries?"}],"hints":[{"label":"GC log format explained","body":"Format: [time][uptime][level][tags] GC(N) event reason heap_before→heap_after(heap_max) pause_ms. Example: GC(3) Pause Young (Normal) (G1 Evacuation Pause) 45M→12M(512M) 8.234ms — heap went from 45MB used to 12MB used, max heap is 512MB, pause was 8ms. 'Normal' = regular young GC. 'Concurrent Start' = G1 beginning a concurrent marking cycle because heap occupancy hit the threshold. Full GC triggers: Old Gen full, explicit System.gc() call, humongous allocation failure."}],"solution":null},{"num":2,"title":"Compare G1GC vs ZGC under load","goal":"Run the same workload under both GC algorithms. Measure max pause time, average pause, and throughput. Make a justified recommendation for a banking API service.","setup":{"desc":"Use Apache Bench to drive load while the app runs with each GC configuration.","steps":[{"text":"Load test command (run while app is running):","code":"ab -n 200 -c 10 http://localhost:8080/gc-stress","lang":"bash"}]},"explore":[{"text":"Run the load test with G1GC. Note the max pause time from the GC log.","code":"-Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200\n-Xlog:gc*:file=/tmp/gc-g1.log:time","lang":"bash","note":"Record: max pause, average pause, number of Full GC events."},{"text":"Restart with ZGC and run the same load test.","code":"-Xmx512m -XX:+UseZGC\n-Xlog:gc*:file=/tmp/gc-zgc.log:time","lang":"bash","note":"Record the same metrics. ZGC pauses should be dramatically shorter."},{"text":"Open both logs on gceasy.io side by side. Compare the pause time distributions. Which GC had more consistent pauses?"},{"text":"Write a 3-sentence recommendation: for a Backbase banking API running on JDK 17 with 4 cores and 2GB heap, which GC would you choose and why?"}],"hints":[{"label":"When to choose G1GC vs ZGC","body":"G1GC: default since JDK 9, good throughput, pause targets configurable, heap < 4GB, JDK 11+. ZGC: concurrent collection — most work happens while your app runs, pauses are typically < 1ms regardless of heap size, slight throughput reduction. For Backbase API services where p99 response time matters: ZGC on JDK 17+ is usually better. For batch processing jobs where total throughput matters more than individual request latency: G1GC is fine."}],"solution":null}],"refs":[{"type":"Oracle docs","name":"GC Tuning Guide (JDK 21)","url":"https://docs.oracle.com/en/java/javase/21/gctuning/introduction-garbage-collection-tuning.html","desc":"Official guide. Read the G1GC and ZGC chapters."},{"type":"Tool","name":"GCeasy.io","url":"https://gceasy.io","desc":"Visual GC log analyser. Free tier is sufficient for this lab."},{"type":"Book","name":"Java Performance (Scott Oaks)","url":"https://www.oreilly.com/library/view/java-performance-2nd/9781492056454/","desc":"Chapters 5–6 cover JVM/GC tuning with the same methodology as this week."}],"checklist":["Produced a real GC log with Young GC events using the stress endpoint","Can parse the 'before→after(heap) pauseMs' format without looking it up","Identified what triggers Full GC events — and how to prevent them","Ran identical load with G1GC and ZGC — compared max pause times","Can recommend G1GC vs ZGC for a banking API with clear reasoning"]},{"id":"java-w6","num":"Week 6","module":"java","title":"Memory Leaks, Heap Dumps & Thread Pools","subtitle":"Find production leaks and diagnose thread pool exhaustion from a thread dump","hours":11,"tagClasses":["tag-java","tag-time"],"tagLabels":["Java Performance","~11 hours"],"ddia":null,"objectives":["Build an intentional memory leak and confirm heap growth with jstat","Take a heap dump with jmap and find the leaking object in Eclipse MAT","Take a thread dump with jstack and identify thread states","Recognise what HikariCP pool exhaustion looks like in a thread dump","Name four common memory leak patterns in Spring Boot"],"diagram":{"type":"memleak","caption":"Normal vs leaking heap — what jstat shows over time","intro":"In a healthy JVM, heap usage rises during requests and drops after GC — a sawtooth pattern that stays near a stable baseline. A memory leak produces a different pattern: heap grows steadily past GC cycles because live references prevent the collector from freeing unreachable objects. It keeps growing until it hits the maximum heap size and crashes with OutOfMemoryError. The chart below shows both patterns. You will reproduce the leaking pattern this week using jstat and track it in real time."},"labs":[{"num":1,"title":"Build a leak, observe it, find it","goal":"Write an endpoint with an intentional memory leak. Load test it. Watch the heap climb. Take a heap dump. Find the leaking object in Eclipse MAT.","setup":{"desc":"Use the banking-app from Week 3. Add a leaking endpoint and set JVM flags to capture the heap dump automatically.","steps":[{"text":"Set these JVM flags (IntelliJ → Run → Edit Configurations → VM Options):","code":"-Xmx256m\n-XX:+HeapDumpOnOutOfMemoryError\n-XX:HeapDumpPath=/tmp/\n-Xlog:gc*::time","lang":"bash"}]},"explore":[{"text":"Design the leaking endpoint yourself before looking at the hint. Think: what Java data structure, if held in a static field and added to on every request, would grow forever? Write it, verify it compiles, then continue."},{"text":"In Terminal 1, start the load test.","code":"# ab = Apache Bench  |  -n = total requests  |  -c = concurrent users\nab -n 5000 -c 10 http://localhost:8080/your-endpoint","lang":"bash","note":"Install ab: sudo apt install apache2-utils (Linux) or brew install httpd (macOS)."},{"text":"In Terminal 2, find your app PID and watch Old Gen usage in real time.","code":"# jps = Java Process Status  |  -l = show full class or jar name\njps -l\n\n# jstat -gcutil: GC stats polled every 2000ms (2 sec)\n# S0/S1=Survivor%  E=Eden%  O=OldGen%  M=Metaspace%  YGC/FGC=GC counts\njstat -gcutil YOUR_PID 2000","lang":"bash","note":"Watch the O column climb toward 100%. At 100% the app OOMErrors and writes a heap dump to /tmp/"},{"text":"Take a manual heap dump before OOM occurs, then open it in Eclipse MAT.","code":"# Take heap dump manually (find PID from jps first)\n# format=b = binary (required by MAT)  |  file = output path\njmap -dump:format=b,file=/tmp/manual.hprof YOUR_PID\n\n# Then in Eclipse MAT:\n# File → Open Heap Dump → /tmp/manual.hprof\n# Run: File → Leak Suspects Report","lang":"bash","note":"In the Leak Suspects report: find the object retaining the most heap. Click through the 'Shortest paths to accumulation point' to see the reference chain. You should find your static field holding the growing collection."},{"text":"Fix the leak. Then list two other common Java memory leak patterns from your reading — one involving ThreadLocal and one involving event listeners."}],"hints":[{"label":"Simple intentional leak","body":"private static final Map<String, byte[]> cache = new HashMap<>(); — on every request add: cache.put(UUID.randomUUID().toString(), new byte[50_000]); — 50KB per request, never cleared. jstat O% climbs at a rate proportional to your request rate. In MAT's dominator tree: YourController → static HashMap → all byte arrays."},{"label":"Four common Spring Boot leak patterns","body":"1) Static collections grown without bounds (this lab). 2) ThreadLocal values added in a filter but never removed — accumulate in Tomcat's thread pool threads permanently. 3) @EventListener methods that register a listener without a corresponding @EventListener for removal, causing the listener to be GC-rooted indefinitely. 4) Classloader leaks during hot redeploy — Metaspace grows each redeploy, not heap, requiring a full restart."}],"solution":null},{"num":2,"title":"Thread dump analysis","goal":"Thread dumps reveal every thread's state at an instant in time. Learn to read them to diagnose stuck threads, pool exhaustion, and HikariCP wait patterns.","setup":{"desc":"Add a slow endpoint that holds a thread for 30 seconds.","steps":[{"code":"@GetMapping(\"/hold\")\npublic String hold() throws InterruptedException {\n    Thread.sleep(30_000);\n    return \"released\";\n}","lang":"java"}]},"explore":[{"text":"Hit /hold with 10 concurrent requests, then take a thread dump while they're running.","code":"# Fire 10 concurrent requests (in background)\nab -n 10 -c 10 http://localhost:8080/hold &\n\n# Find your app PID\njps -l\n\n# Take a thread dump\n# jstack: captures all JVM thread states at this instant\njstack YOUR_PID > /tmp/threaddump.txt","lang":"bash"},{"text":"Open the thread dump and find the sleeping threads. What state are they in? What does the stack trace show?","code":"# Count threads by state\ngrep 'java.lang.Thread.State' /tmp/threaddump.txt | sort | uniq -c","lang":"bash","note":"TIMED_WAITING threads are sleeping (Thread.sleep). Their stack traces show Thread.sleep at the top. WAITING threads are waiting indefinitely. BLOCKED threads are trying to acquire a monitor lock."},{"text":"Paste the thread dump into fastthread.io and read the 'Thread State' pie chart.","code":"open https://fastthread.io","lang":"bash","note":"A pie chart dominated by BLOCKED threads means heavy lock contention. WAITING threads waiting on HikariCP is the signature of pool exhaustion."},{"text":"Now simulate HikariCP exhaustion: set pool size = 3, write an endpoint that holds a connection for 5 seconds, hit it with 10 requests. Take another thread dump and find the threads waiting for a connection — what does their stack trace show?"}],"hints":[{"label":"HikariCP exhaustion signature in thread dump","body":"Threads waiting for a DB connection from HikariCP appear as TIMED_WAITING with this stack pattern near the top: java.util.concurrent.locks.LockSupport.parkNanos → com.zaxxer.hikari.util.ConcurrentBag.borrow → com.zaxxer.hikari.pool.HikariPool.getConnection → com.zaxxer.hikari.HikariDataSource.getConnection. If you see many threads with this pattern, your pool is exhausted. Check maximum-pool-size and connection-timeout in your HikariCP config."}],"solution":null}],"refs":[{"type":"Tool","name":"Eclipse Memory Analyser (MAT)","url":"https://www.eclipse.org/mat/downloads.php","desc":"Industry-standard heap dump analyser. 'Leak Suspects' report finds the problem automatically."},{"type":"Tool","name":"FastThread.io","url":"https://fastthread.io","desc":"Visual thread dump analyser. Identifies deadlocks and blocked threads automatically."},{"type":"Baeldung","name":"Java Memory Leak Guide","url":"https://www.baeldung.com/java-memory-leaks","desc":"All common patterns: static collections, ThreadLocal, event listeners, classloader leaks."}],"checklist":["Built an intentional leak and confirmed heap growth with jstat O% column","Took a heap dump and opened it in Eclipse MAT","Found the leaking object via the Leak Suspects report and dominator tree","Took a thread dump during load and identified sleeping threads by state","Simulated HikariCP exhaustion and found the waiting pattern in the thread dump"]}]},{"id":"spring","title":"Spring Boot Internals","color":"#2a6614","tagClass":"tag-spring","icon":"🌱","desc":"Understand what Spring does at startup and at runtime. Knowing Spring's internals lets you read Backbase's code, debug startup failures, and reason about @Transactional without guessing.","weeks":[{"id":"spring-w7","num":"Week 7","module":"spring","title":"IoC Container & Bean Lifecycle","subtitle":"What Spring does at startup — and why Backbase upgrade failures happen here","hours":11,"tagClasses":["tag-spring","tag-time"],"tagLabels":["Spring Internals","~11 hours"],"ddia":null,"objectives":["Describe the full bean lifecycle from instantiation through @PostConstruct to @PreDestroy","Write a BeanPostProcessor that hooks into every bean creation event","Explain how @Conditional annotations gate autoconfiguration","Use /actuator/conditions to debug why a bean did or did not get created","Resolve a ConflictingBeanDefinitionException caused by a Backbase starter"],"diagram":{"type":"spring-lifecycle","caption":"Spring bean lifecycle — startup sequence","intro":"Spring Boot doesn't just instantiate your classes — it runs every bean through a precise lifecycle before the application is ready to serve requests. The order matters: constructor, dependency injection, @PostConstruct, then ready. Understanding this tells you why @PostConstruct is the right place for initialisation code (dependencies are available), why circular dependencies fail at a specific phase, and how Spring Boot auto-configuration registers hundreds of beans transparently via @Conditional checks."},"setup":{"desc":"Create a minimal Spring Boot app with the actuator. You will use it for both Week 7 and Week 8.","steps":[{"text":"Add to pom.xml:","code":"<dependency>\n  <groupId>org.springframework.boot</groupId>\n  <artifactId>spring-boot-starter-web</artifactId>\n</dependency>\n<dependency>\n  <groupId>org.springframework.boot</groupId>\n  <artifactId>spring-boot-starter-actuator</artifactId>\n</dependency>","lang":"yaml"},{"text":"Enable all actuator endpoints in application.yml:","code":"management:\n  endpoints:\n    web:\n      exposure:\n        include: \"*\"","lang":"yaml"}]},"labs":[{"num":1,"title":"Hook into the container with a BeanPostProcessor","goal":"The best way to understand Spring's container is to instrument it. Write a BeanPostProcessor that runs for every single bean the container creates.","setup":{"desc":"Use the banking-app from Week 3. All lab steps run in that existing app — no new project needed.","steps":[{"text":"Make sure the app starts cleanly with: mvn spring-boot:run or via IntelliJ. You should see Spring startup logs and /actuator/health returning UP at http://localhost:8080/actuator/health"}]},"explore":[{"text":"Write a class that implements BeanPostProcessor with both methods. Log the bean name and class for every bean. Start the app and count how many beans were created by a minimal Spring Boot app.","reveal":true,"code":"@Component\npublic class BeanObserver implements BeanPostProcessor {\n    private static final Logger log =\n        LoggerFactory.getLogger(BeanObserver.class);\n\n    @Override\n    public Object postProcessBeforeInitialization(\n        Object bean, String beanName) {\n        // runs before @PostConstruct\n        log.info(\"[BEFORE] {} ({})\",\n            beanName, bean.getClass().getSimpleName());\n        return bean;\n    }\n\n    @Override\n    public Object postProcessAfterInitialization(\n        Object bean, String beanName) {\n        // runs after @PostConstruct\n        return bean;\n    }\n}","lang":"java","note":"A minimal Spring Boot web app typically creates 200–400 beans. Most are internal Spring infrastructure beans."},{"text":"Filter for proxied beans — beans whose class name contains '$$'. Log them with their real class. Add a @Service with @Transactional. Is it proxied? What is its actual class name?","code":"// In postProcessAfterInitialization:\nif (bean.getClass().getName().contains(\"$$\")) {\n    log.info(\"[PROXY] {} is wrapped as: {}\",\n        beanName, bean.getClass().getName());\n}","lang":"java","note":"CGLIB proxies appear as YourClass$$SpringCGLIB$$0. Any bean with @Transactional, @Async, or @Cacheable gets wrapped this way. This is how Spring adds behaviour without modifying your source code."},{"text":"Research: what is the difference between BeanFactory and ApplicationContext? What additional services does ApplicationContext provide that BeanFactory does not?"}],"hints":[{"label":"Why beans get proxied","body":"Spring creates a CGLIB subclass (proxy) for any bean that needs method interception: @Transactional (wrap method in transaction), @Async (run method on thread pool), @Cacheable (check cache before calling method). The proxy wraps the real bean. When external code calls the method, the proxy intercepts the call and adds the behaviour. This is why self-invocation breaks @Transactional — internal this.method() calls bypass the proxy."}],"solution":null},{"num":2,"title":"Understand autoconfiguration","goal":"Spring Boot's 'add a dependency and it works' magic is autoconfiguration. When it breaks — or when you need to override it for Backbase — you need to understand the mechanism.","explore":[{"text":"Start the app and hit the conditions endpoint. Find DataSourceAutoConfiguration and read what @Conditional annotations made it activate (or not).","code":"curl http://localhost:8080/actuator/conditions | python3 -m json.tool | grep -A5 'DataSource'","lang":"bash"},{"text":"Write a conditional configuration and test both states.","code":"@Configuration\n@ConditionalOnProperty(\n    name = \"banking.audit.enabled\",\n    havingValue = \"true\"\n)\npublic class AuditConfig {\n    @Bean\n    public AuditService auditService() {\n        return new AuditService();\n    }\n}","lang":"java","note":"Test with banking.audit.enabled=true in application.properties, then without it. Hit /actuator/conditions both times and find AuditConfig in the output — it will appear in positiveMatches or negativeMatches."},{"text":"Simulate a Backbase-style conflict: define a @Bean of the same type that Spring Boot also autoconfigures (e.g. a custom Jackson ObjectMapper). Observe the ConflictingBeanDefinitionException. Then fix it with @ConditionalOnMissingBean on one of them.","note":"@ConditionalOnMissingBean means 'only create this bean if no other bean of this type exists yet'. Backbase starters use this pattern so your customisations take precedence over their defaults."}],"hints":[{"label":"Reading the /actuator/conditions output","body":"The response has three sections: positiveMatches (conditions that passed — bean was created), negativeMatches (conditions that failed — bean was NOT created), and unconditionalClasses (always created). Each entry shows which @Conditional annotation was evaluated and what the result was. This is the most useful tool for debugging 'why did Backbase's bean not get created?'"}],"solution":null}],"refs":[{"type":"Spring docs","name":"The IoC Container","url":"https://docs.spring.io/spring-framework/docs/current/reference/html/core.html#beans","desc":"Sections 1.1–1.7: bean definitions, dependencies, scopes, lifecycle callbacks."},{"type":"Spring Boot docs","name":"Creating Auto-configuration","url":"https://docs.spring.io/spring-boot/docs/current/reference/html/features.html#features.developing-auto-configuration","desc":"How @Conditional gates autoconfiguration. Essential for understanding Backbase starters."}],"checklist":["BeanPostProcessor logs every bean — counted total beans at startup","Identified all proxied beans and the annotations that caused them","Used /actuator/conditions to explain a conditional bean activating or not","Reproduced a bean definition conflict and resolved it with @ConditionalOnMissingBean","Can explain the difference between BeanFactory and ApplicationContext"]},{"id":"spring-w8","num":"Week 8","module":"spring","title":"AOP, @Transactional & Spring Security Filter Chain","subtitle":"The proxy mechanism behind Spring's most critical features — and how Backbase auth hooks in","hours":12,"tagClasses":["tag-spring","tag-time"],"tagLabels":["Spring Internals","~12 hours"],"ddia":null,"objectives":["Explain how CGLIB proxies implement AOP without modifying source code","Reproduce the self-invocation @Transactional bug and confirm the silent failure","Fix the bug correctly using a separate service class","Distinguish REQUIRED vs REQUIRES_NEW propagation — and explain when each is right in banking","Trace a request through the Spring Security FilterChain"],"diagram":{"type":"aop","caption":"CGLIB proxy interception — how @Transactional actually works","intro":"@Transactional, @Cacheable, and @Async don't modify your code directly — Spring wraps your bean in a CGLIB proxy at startup. When an external caller invokes your method, the proxy intercepts the call first and applies the annotation's behaviour (opening a transaction, checking the cache, dispatching async). The critical trap is self-invocation: when your own method calls another method on the same class, it calls the real bean directly — the proxy is never involved and the annotation is silently ignored. This is the single most common source of @Transactional bugs in production Spring code."},"labs":[{"num":1,"title":"Break @Transactional with self-invocation","goal":"The most common Spring mistake across all experience levels. Reproduce the silent failure, verify it with a transaction name check, understand the mechanism, then fix it correctly.","setup":{"desc":"Create a PaymentService with two @Transactional methods and a JPA repository.","steps":[{"code":"@Service\npublic class PaymentService {\n\n    @Autowired\n    private PaymentRepository repo,\n\n    @Transactional\n    public void processPayment(Payment p) {\n        repo.save(p);\n        // Calls another @Transactional method on 'this'\n        validateAndNotify(p);\n    }\n\n    @Transactional(rollbackFor = Exception.class)\n    public void validateAndNotify(Payment p) {\n        String txName = TransactionSynchronizationManager\n            .getCurrentTransactionName();\n        log.info(\"Transaction name: {}\", txName);\n\n        if (p.getAmount().compareTo(BigDecimal.ZERO) < 0) {\n            throw new IllegalArgumentException(\"Negative amount\");\n        }\n    }\n}","lang":"java"}]},"explore":[{"text":"Call processPayment with a negative amount. Does it roll back the save()? Check the database to verify.","note":"Expected (broken) behaviour: save() is NOT rolled back even though validateAndNotify() throws. The transaction on validateAndNotify() was never started — the self-call bypassed the proxy."},{"text":"Read the log line showing the transaction name inside validateAndNotify(). When called via self-invocation it will be null. When called from an external class it will show the transaction name. Verify both cases.","note":"null transaction name = no transaction context = the @Transactional annotation had no effect."},{"text":"Draw the call flow on paper: external caller → proxy → real PaymentService.processPayment() → this.validateAndNotify() (direct, no proxy). Mark exactly where the proxy steps out of the picture."},{"text":"Fix the bug by moving validateAndNotify() to a separate @Service class. Call it via injection. Re-run the test and verify the rollback now works correctly.","code":"@Service\npublic class PaymentValidationService {\n\n    @Transactional(rollbackFor = Exception.class)\n    public void validateAndNotify(Payment p) {\n        // Now intercepted by ITS OWN proxy\n        if (p.getAmount().compareTo(BigDecimal.ZERO) < 0) {\n            throw new IllegalArgumentException(\"Negative amount\");\n        }\n    }\n}","lang":"java"}],"hints":[{"label":"Why fix (c) — REQUIRES_NEW — does not work","body":"Adding REQUIRES_NEW to validateAndNotify() does not fix self-invocation. REQUIRES_NEW is implemented on the proxy, not on the method. The self-call this.validateAndNotify() bypasses the proxy entirely — Spring never gets a chance to start a new transaction. Fix (a) — separate class — is always the cleanest. Fix (b) — inject self — works but smells like circular dependency. Fix (c) — REQUIRES_NEW — does not work."}],"solution":null},{"num":2,"title":"REQUIRES_NEW — audit log independence","goal":"In banking, audit logs must be written even when the main transaction fails. REQUIRES_NEW creates an independent transaction for exactly this purpose.","explore":[{"text":"Build the scenario: PaymentService saves a payment and calls AuditService.logAudit() — which uses REQUIRED (default). Throw a RuntimeException after the audit call. Check the database — did the audit log survive?","reveal":true,"code":"@Service\npublic class AuditService {\n\n    @Transactional(propagation = Propagation.REQUIRED)\n    public void logAudit(String action, Long entityId) {\n        auditRepo.save(new AuditEntry(action, entityId));\n    }\n}","lang":"java","note":"With REQUIRED: the audit log is part of the same transaction as the payment. When the payment rolls back, the audit log rolls back too. The audit log is lost."},{"text":"Change AuditService to REQUIRES_NEW. Repeat the test. Does the audit log survive the payment rollback now?","note":"With REQUIRES_NEW: Spring suspends the outer transaction, starts a fresh inner transaction for the audit, commits it immediately, then resumes the outer transaction. The audit log is committed independently."},{"text":"Design question: a payment processing flow has these steps — validate → reserve funds → call external payment API → record transfer → send notification. Which steps should share a transaction? Which need their own? Write your answer and reasoning."}],"hints":[{"label":"REQUIRED vs REQUIRES_NEW — when to use each","body":"REQUIRED (default): join existing transaction if one exists, otherwise create new. All steps are atomic together — any failure rolls everything back. Use for: multi-step operations that must be atomic (debit + credit in a transfer). REQUIRES_NEW: always create a new transaction, suspend any outer transaction. Use for: audit logs (must survive outer rollback), idempotency records, notification events (fire-and-forget). Never use REQUIRES_NEW for the main business logic — it breaks atomicity."}],"solution":null}],"refs":[{"type":"Spring docs","name":"Declarative Transaction Management","url":"https://docs.spring.io/spring-framework/docs/current/reference/html/data-access.html#transaction-declarative","desc":"The proxy mechanism explained. Read 'Understanding the Spring Framework Declarative Transaction Mechanism'."},{"type":"Spring docs","name":"Spring AOP","url":"https://docs.spring.io/spring-framework/docs/current/reference/html/core.html#aop","desc":"Proxy types, pointcuts, advice. Read Sections 5.1–5.8."},{"type":"Spring Security","name":"Servlet Security Architecture","url":"https://docs.spring.io/spring-security/reference/servlet/architecture.html","desc":"FilterChain diagram — essential for understanding how Backbase auth integrates."}],"checklist":["Reproduced self-invocation bug — verified save() is NOT rolled back","Confirmed via transaction name log that no transaction exists in the self-called method","Fixed bug with a separate service class — verified rollback works","Demonstrated REQUIRES_NEW: audit log persists when payment rolls back","Can explain all propagation levels and when to use REQUIRED vs REQUIRES_NEW"]}]},{"id":"infra","title":"Cloud & Kubernetes","color":"#952020","tagClass":"tag-infra","icon":"☁","desc":"Containerise your Spring Boot app, deploy to Kubernetes, configure health probes correctly, write Helm charts. This is how Backbase upgrades and deployments actually work.","weeks":[{"id":"infra-w9","num":"Week 9","module":"infra","title":"Docker & Containerisation","subtitle":"Write a production Dockerfile, understand layers, avoid the JVM memory trap","hours":11,"tagClasses":["tag-infra","tag-time"],"tagLabels":["Cloud/K8s","~11 hours"],"ddia":null,"objectives":["Explain how Docker image layers work and why order determines cache efficiency","Write a multi-stage production Dockerfile using Spring Boot's layertools","Configure correct JVM memory flags for containerised deployment","Build a Docker Compose stack (app + Postgres + Redis) with proper health checks","Understand the JVM + container memory limit interaction that causes OOMKill"],"diagram":{"type":"docker-layers","caption":"Docker image layers — build cache and change frequency","intro":"Docker builds images as a stack of layers, and layers are cached. If a layer hasn't changed since the last build, Docker reuses it from cache — turning a five-minute rebuild into a ten-second one. The trap: if you COPY your fat jar in one instruction, changing any source file invalidates the entire layer including all 100MB of Maven dependencies. Understanding layer ordering lets you ensure that only your 200KB application layer rebuilds on every commit."},"labs":[{"num":1,"title":"Write your own production Dockerfile","goal":"Start with a naive Dockerfile, measure its problems, then improve it step by step. The complete solution is hidden — try to reach it yourself using the exploration steps and the docs.","setup":{"desc":"Use the banking-app from Week 3. Package it as a fat jar — this is the jar file your Dockerfile will use.","steps":[{"text":"From the banking-app project root:","code":"mvn clean package -DskipTests","lang":"bash"}]},"explore":[{"text":"Write your first attempt — a naive Dockerfile that just copies the fat jar and runs it. Build it and measure the image size.","code":"docker build -t my-app:naive .\ndocker image ls my-app:naive","lang":"bash","note":"This is your baseline. A naive Dockerfile typically produces a 300–500MB image. Note the build time — you'll compare this after improvements."},{"text":"Change one source file and rebuild. Which layers were rebuilt? How long did it take? This is the layer cache problem that multi-stage builds solve.","note":"With a naive COPY target/*.jar approach, changing any source file rebuilds the entire layer including all 100MB of Maven dependencies. The goal is to make code changes only rebuild the tiny 'application classes' layer."},{"text":"Research Spring Boot layertools. Run this to see how Spring Boot splits your fat jar into layers:","code":"java -Djarmode=layertools -jar target/myapp.jar list","lang":"bash","note":"You should see: dependencies, spring-boot-loader, snapshot-dependencies, application. 'dependencies' changes only when pom.xml changes. 'application' changes on every build. This informs your COPY instruction order."},{"text":"Research the JVM container memory problem. What happens when -Xmx is not set and your JVM runs in a 512MB container on a 32GB host? Which JVM flag makes the heap respect the container limit? Why should you not set it to 100%?","note":"The JVM heap is not the only memory the JVM uses. Metaspace (~100MB), thread stacks (~1MB × N threads), and Netty direct buffers also consume memory. Setting MaxRAMPercentage=100 leaves nothing for these — causing OOMKill."},{"text":"Now write an improved multi-stage Dockerfile using what you learned in steps 2–4. Use eclipse-temurin:21-jre-alpine as the production base, copy layers in the correct order, and add the right JVM flags."}],"hints":[{"label":"Multi-stage structure and JVM flags","body":"Stage 1 (builder): FROM eclipse-temurin:21-jdk-alpine AS builder — copy the fat jar and run layertools extract. Stage 2 (runtime): FROM eclipse-temurin:21-jre-alpine — add a non-root user, copy layers in order (dependencies → spring-boot-loader → snapshot-dependencies → application). ENTRYPOINT: java -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseZGC org.springframework.boot.loader.JarLauncher. The 75% leaves 25% for Metaspace, thread stacks, and direct buffers."}],"solution":{"lang":"dockerfile","content":"# Stage 1: extract layers from the fat jar\nFROM eclipse-temurin:21-jdk-alpine AS builder\nWORKDIR /application\nCOPY target/myapp.jar application.jar\nRUN java -Djarmode=layertools -jar application.jar extract\n\n# Stage 2: production runtime image\nFROM eclipse-temurin:21-jre-alpine\nWORKDIR /application\n\n# Non-root user for security\nRUN addgroup -S appgroup && adduser -S appuser -G appgroup\nUSER appuser\n\n# Copy layers: least-changed first (cache-optimal)\nCOPY --from=builder /application/dependencies/ ./\nCOPY --from=builder /application/spring-boot-loader/ ./\nCOPY --from=builder /application/snapshot-dependencies/ ./\nCOPY --from=builder /application/application/ ./\n\nENTRYPOINT [\"java\", \\\n  \"-XX:+UseContainerSupport\", \\\n  \"-XX:MaxRAMPercentage=75.0\", \\\n  \"-XX:+UseZGC\", \\\n  \"-Djava.security.egd=file:/dev/./urandom\", \\\n  \"org.springframework.boot.loader.JarLauncher\"]"}},{"num":2,"title":"Docker Compose local stack with health checks","goal":"Build a complete local stack (app + Postgres + Redis) without the solution first. Deliberately hit the startup race condition, observe it, then fix it with health checks.","setup":{"desc":"Use the Docker image you built in Lab 1 (my-banking-app:latest). The docker-compose.yml will orchestrate that image alongside Postgres and Redis.","steps":[{"text":"Make sure you have the image built from Lab 1:","code":"docker images | grep my-banking-app","lang":"bash"}]},"explore":[{"text":"Write a docker-compose.yml with your app (image: my-banking-app:latest), Postgres, and Redis. Start it — what race condition appears when all three start simultaneously?","note":"Your app will try to connect to Postgres before Postgres is ready to accept connections. Spring Boot will fail with 'Connection refused' and exit. Without restart policies or health checks, this is unrecoverable."},{"text":"Research Docker Compose healthcheck and depends_on with condition: service_healthy. How do you write a health check for Postgres? For Redis?","note":"Postgres: test: ['CMD-SHELL', 'pg_isready -U youruser -d yourdb']. Redis: test: ['CMD', 'redis-cli', 'ping']. Then in your app service: depends_on: postgres: condition: service_healthy."},{"text":"Add health checks and restart the stack. Confirm the race condition is gone. How long does it take from 'docker compose up' to the app accepting requests?"}],"hints":[],"solution":{"lang":"yaml","content":"version: '3.9'\nservices:\n  app:\n    build: .\n    ports: [\"8080:8080\"]\n    environment:\n      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bankdb\n      SPRING_DATASOURCE_USERNAME: bank\n      SPRING_DATASOURCE_PASSWORD: secret\n      SPRING_DATA_REDIS_HOST: redis\n    depends_on:\n      postgres:\n        condition: service_healthy\n      redis:\n        condition: service_healthy\n\n  postgres:\n    image: postgres:16-alpine\n    environment:\n      POSTGRES_DB: bankdb\n      POSTGRES_USER: bank\n      POSTGRES_PASSWORD: secret\n    volumes: [postgres-data:/var/lib/postgresql/data]\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U bank -d bankdb\"]\n      interval: 5s\n      timeout: 5s\n      retries: 5\n\n  redis:\n    image: redis:7-alpine\n    healthcheck:\n      test: [\"CMD\", \"redis-cli\", \"ping\"]\n      interval: 5s\n      retries: 5\n\nvolumes:\n  postgres-data:"}}],"refs":[{"type":"Docker docs","name":"Dockerfile Best Practices","url":"https://docs.docker.com/develop/develop-images/dockerfile_best-practices/","desc":"Layer caching, multi-stage builds, minimising image size."},{"type":"Spring docs","name":"Container Images","url":"https://docs.spring.io/spring-boot/docs/current/reference/html/container-images.html","desc":"Spring Boot's layertools and Buildpacks for efficient images."}],"checklist":["Wrote a multi-stage Dockerfile from scratch — checked solution only after attempt","Measured image size improvement: naive vs optimised","Confirmed layer cache hit when changing only application code","Configured JVM memory flags and verified heap size inside container","Built Docker Compose stack — reproduced and fixed the startup race condition"]},{"id":"infra-w10","num":"Week 10","module":"infra","title":"Kubernetes Fundamentals","subtitle":"Pods, Deployments, Services, kubectl, and health probes — the foundation before any K8s tuning","hours":10,"tagClasses":["tag-infra","tag-time"],"tagLabels":["Cloud/K8s","~10 hours"],"ddia":null,"objectives":["Explain what Kubernetes solves that Docker Compose cannot","Describe the purpose of each control plane component: API Server, etcd, Scheduler, Controller Manager","Identify the core K8s workload objects: Pod, ReplicaSet, Deployment — and how they relate","Use kubectl to deploy, inspect, scale, update, and delete workloads","Write a Deployment YAML with labels, environment variables, and resource requests","Expose a Deployment with a ClusterIP Service and access it via port-forwarding","Configure all three probe types (startup, readiness, liveness) correctly for a Spring Boot app","Reproduce the cascading-restart failure caused by a misconfigured liveness probe"],"diagram":{"type":"k8s-arch","caption":"Kubernetes architecture — control plane + worker nodes","intro":"Before deploying anything, you need a mental model of the cluster itself. Kubernetes is split into a control plane (the brain — decides what should run) and worker nodes (the muscle — actually run it). Every kubectl command you issue goes to the API Server on the control plane. The rest of the system responds by reconciling real cluster state to match what you declared. This declarative model is the fundamental difference from Docker Compose."},"setup":{"desc":"All K8s labs in Weeks 10–13 run on minikube — a single-node Kubernetes cluster on your laptop. Install the tools below once, then you are set for all four weeks.","steps":[{"text":"Install minikube. Requires Docker Desktop to be running as the container driver.","os_tabs":[{"os":"macOS","lang":"bash","code":"brew install minikube"},{"os":"Linux","lang":"bash","code":"curl -Lo minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64\nchmod +x minikube && sudo mv minikube /usr/local/bin/"},{"os":"Windows","lang":"bash","code":"# PowerShell (run as Administrator)\nwinget install minikube\n# Or: choco install minikube"}]},{"text":"Install kubectl (the K8s CLI).","os_tabs":[{"os":"macOS","lang":"bash","code":"brew install kubectl"},{"os":"Linux","lang":"bash","code":"sudo apt-get install -y kubectl"},{"os":"Windows","lang":"bash","code":"winget install Kubernetes.kubectl"}]},{"text":"Install Apache Bench — used in Week 11 for HPA load generation.","os_tabs":[{"os":"macOS","lang":"bash","code":"# Check if already available (macOS ships it with Apache):\nwhich ab || brew install httpd"},{"os":"Linux","lang":"bash","code":"sudo apt-get install -y apache2-utils"},{"os":"Windows","lang":"bash","code":"# ab is not available natively on Windows.\n# Install hey (a modern alternative) instead:\nwinget install hey\n# Then replace all 'ab -n X -c Y URL' commands with:\n# hey -n X -c Y URL"}]},{"text":"Start minikube and verify the cluster is up:","code":"minikube start --memory=4096 --cpus=4\nkubectl cluster-info\nkubectl get nodes\n# Expected: one node in Ready state","lang":"bash"},{"text":"Point Docker to minikube's internal registry so images built locally are visible inside the cluster:","os_tabs":[{"os":"macOS / Linux","lang":"bash","code":"eval $(minikube docker-env)\n# Build your app image (from the Week 9 Dockerfile)\ndocker build -t my-banking-app:v1 .\ndocker images | grep my-banking-app"},{"os":"Windows (PowerShell)","lang":"bash","code":"& minikube -p minikube docker-env | Invoke-Expression\ndocker build -t my-banking-app:v1 .\ndocker images | Select-String my-banking-app"}]}]},"labs":[{"num":1,"title":"Your first Deployment — Pods, ReplicaSets, and self-healing","goal":"Write a minimal Deployment YAML from scratch and apply it. Observe what K8s creates behind the scenes, then experience the self-healing behaviour that makes K8s different from Docker.","explore":[{"text":"Before writing YAML, answer these three questions by reading the K8s docs. This is important — the answers shape everything you do this week. (1) What is a Pod? Why does K8s use Pods instead of just containers? (2) What is a ReplicaSet? Why does K8s have both Deployments and ReplicaSets? (3) What does 'declarative' mean in K8s — how is 'kubectl apply' different from 'docker run'?","note":"K8s docs: https://kubernetes.io/docs/concepts/workloads/pods/ and https://kubernetes.io/docs/concepts/workloads/controllers/deployment/ — 15 minutes of reading before starting the lab."},{"text":"Write a minimal Deployment YAML. Use imagePullPolicy: Never (because the image is local to minikube). Start with these required fields only — do not add probes or resources yet.","code":"# Save as deployment.yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: banking-app\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n      app: banking-app\n  template:\n    metadata:\n      labels:\n        app: banking-app\n    spec:\n      containers:\n      - name: banking-app\n        image: my-banking-app:v1\n        imagePullPolicy: Never\n        ports:\n        - containerPort: 8080","lang":"yaml"},{"text":"Apply the Deployment and watch pods start.","code":"kubectl apply -f deployment.yaml\n# Watch pods appear (Ctrl+C to stop)\nkubectl get pods -w","lang":"bash","note":"The pod goes through: Pending (scheduled to a node) → ContainerCreating (image being pulled, container starting) → Running. If it stays in Pending, check kubectl describe pod <pod-name> for the reason."},{"text":"Look at what K8s created behind the scenes. One Deployment creates a ReplicaSet which creates Pods.","code":"kubectl get deployment banking-app\nkubectl get replicaset\nkubectl describe deployment banking-app\n# Look at Events at the bottom — K8s created a ReplicaSet, which created Pods","lang":"bash","note":"The Deployment manages the ReplicaSet. The ReplicaSet manages Pods. You only interact with the Deployment — the rest is automatic."},{"text":"Experience self-healing: delete the pod manually and watch K8s restart it.","code":"# Get the pod name\nkubectl get pods\n# Delete it\nkubectl delete pod <pod-name>\n# Watch immediately — K8s starts a replacement\nkubectl get pods -w","lang":"bash","note":"This is the core value of K8s: you declared 'I want 1 replica running' and K8s continuously enforces that. When a pod is deleted, the ReplicaSet controller notices the actual count (0) doesn't match desired count (1) and creates a new pod."},{"text":"Scale up and observe. Then scale back down.","code":"kubectl scale deployment banking-app --replicas=3\nkubectl get pods -w\nkubectl scale deployment banking-app --replicas=1","lang":"bash"}],"hints":[{"label":"Pod stuck in CrashLoopBackOff","body":"kubectl logs <pod-name> — check the last 20 lines. Most common cause: the container starts but the app fails (missing environment variables for DB connection, wrong classpath). For a Spring Boot app that can't reach a DB, it may crash on startup. Quick fix for this lab: add spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration to skip DB autoconfiguration."}],"solution":null},{"num":2,"title":"Services — give your app a stable network identity","goal":"A Pod's IP changes every restart. A Service gives a stable IP and DNS name within the cluster. Write a ClusterIP Service, access it via port-forwarding, and understand how label selectors bind Services to Pods.","explore":[{"text":"Write a Service YAML. The selector must match the labels on your Pods (app: banking-app from your Deployment).","code":"# Save as service.yaml\napiVersion: v1\nkind: Service\nmetadata:\n  name: banking-app-svc\nspec:\n  selector:\n    app: banking-app\n  ports:\n  - port: 80\n    targetPort: 8080","lang":"yaml"},{"text":"Apply the Service and verify it found your Pods by checking the Endpoints.","code":"kubectl apply -f service.yaml\nkubectl get service banking-app-svc\n# Endpoints lists the Pod IPs behind this Service\nkubectl get endpoints banking-app-svc","lang":"bash","note":"If Endpoints shows <none>, the Service selector doesn't match any Pod labels. Compare 'kubectl get pods --show-labels' with your service.yaml selector."},{"text":"Use port-forwarding to access the Service from your laptop.","code":"# Forward local port 8080 to Service port 80\nkubectl port-forward service/banking-app-svc 8080:80 &\n# Test it\ncurl http://localhost:8080/actuator/health","lang":"bash"},{"text":"Understand the three Service types. For each, answer: when would you use it in a banking platform? (a) ClusterIP — internal only (default). (b) NodePort — exposes a port on every node's IP. (c) LoadBalancer — provisions a cloud load balancer (AWS ELB, GCP LB). In minikube, run: minikube tunnel to simulate a LoadBalancer.","note":"In production Backbase: ClusterIP is used between microservices (internal). LoadBalancer or Ingress is used for external traffic. NodePort is rarely used directly — it's the underlying mechanism for LoadBalancer."}],"hints":[],"solution":null},{"num":3,"title":"Health probes — startup, readiness, liveness","goal":"This lab is the prerequisite for Week 10A. Configure all three probe types correctly, then deliberately misconfigure liveness to check the database. Watch the cascading-restart failure that brings down your entire app when the DB is unreachable.","explore":[{"text":"Add a startup probe to your Deployment. Spring Boot can take 30–60 seconds to start (loading context, running Liquibase, establishing pool). A startup probe gives it time without triggering liveness failures during startup.","code":"# Add this to your container spec in deployment.yaml:\nstartupProbe:\n  httpGet:\n    path: /actuator/health\n    port: 8080\n  failureThreshold: 30   # 30 × 10s = 5 minutes max startup time\n  periodSeconds: 10","lang":"yaml","note":"The startup probe disables the liveness probe until the first success. This prevents K8s from killing the container because it's 'not alive' during a slow first startup."},{"text":"Add a readiness probe. Readiness controls whether the pod receives traffic — NOT whether it restarts. A failing readiness probe removes the pod from Service endpoints (no traffic), but K8s does not restart it.","code":"readinessProbe:\n  httpGet:\n    path: /actuator/health\n    port: 8080\n  initialDelaySeconds: 10\n  periodSeconds: 5","lang":"yaml","note":"Apply the updated deployment.yaml, then stop your Postgres container: docker stop pg-lab. Watch the pod status. It should go NotReady but NOT restart — the app is still running, it's just not healthy enough to receive traffic."},{"text":"Add a liveness probe. Liveness should only verify that the JVM process itself is responsive — NOT that DB is reachable. Spring Boot Actuator provides a dedicated /actuator/health/liveness endpoint for this purpose.","code":"livenessProbe:\n  httpGet:\n    path: /actuator/health/liveness\n    port: 8080\n  initialDelaySeconds: 60\n  periodSeconds: 10\n  timeoutSeconds: 5\n  failureThreshold: 3","lang":"yaml","note":"Spring Boot Actuator separates liveness (/actuator/health/liveness) from readiness (/actuator/health/readiness) for exactly this reason. Add to application.yml: management.health.livenessstate.enabled: true and management.health.readinessstate.enabled: true"},{"text":"Reproduce the cascading restart failure. Change the liveness probe path to /actuator/health (which includes DB health). Stop your Postgres container. Watch what happens.","code":"# Change liveness probe path from /actuator/health/liveness to /actuator/health\n# Apply the broken config:\nkubectl apply -f deployment.yaml\n\n# Now stop Postgres:\ndocker stop pg-lab\n\n# Watch the chaos:\nkubectl get pods -w\n\n# Describe the pod — find the liveness probe failure in Events:\nkubectl describe pod <pod-name>","lang":"bash","note":"DB goes down → liveness probe calls /actuator/health → DB health check fails → probe returns 500 → K8s restarts the pod → new pod starts, connects to DB... wait, DB is still down → liveness fails again → restart again. All replicas enter this cycle. Even when the DB recovers, newly started pods may take time to reconnect, extending the outage. This is a real production incident pattern."}],"hints":[{"label":"Full Deployment YAML with all three probes","body":"startupProbe + readinessProbe + livenessProbe together. The startup probe fires first: once it passes, liveness and readiness take over. If startup times out (failureThreshold × periodSeconds), K8s restarts the container. After startup passes, liveness runs every periodSeconds — three consecutive failures restart the container. Readiness also runs every periodSeconds — failure removes from Service endpoints but does not restart."}],"solution":{"lang":"yaml","content":"apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: banking-app\nspec:\n  replicas: 2\n  selector:\n    matchLabels:\n      app: banking-app\n  template:\n    metadata:\n      labels:\n        app: banking-app\n    spec:\n      containers:\n      - name: banking-app\n        image: my-banking-app:v1\n        imagePullPolicy: Never\n        ports:\n        - containerPort: 8080\n        env:\n        - name: SPRING_DATASOURCE_URL\n          value: jdbc:postgresql://postgres-svc:5432/bankdb\n        resources:\n          requests:\n            memory: \"512Mi\"\n            cpu: \"250m\"\n          limits:\n            memory: \"512Mi\"\n            cpu: \"500m\"\n        startupProbe:\n          httpGet:\n            path: /actuator/health\n            port: 8080\n          failureThreshold: 30\n          periodSeconds: 10\n        readinessProbe:\n          httpGet:\n            path: /actuator/health/readiness\n            port: 8080\n          initialDelaySeconds: 10\n          periodSeconds: 5\n        livenessProbe:\n          httpGet:\n            path: /actuator/health/liveness\n            port: 8080\n          initialDelaySeconds: 60\n          periodSeconds: 10\n          timeoutSeconds: 5\n          failureThreshold: 3"}}],"refs":[{"type":"K8s docs","name":"Deployments","url":"https://kubernetes.io/docs/concepts/workloads/controllers/deployment/","desc":"Official guide with rollout strategies, scaling, and rollback. Read Updating a Deployment and Rolling Back a Deployment."},{"type":"K8s docs","name":"Configure Liveness, Readiness and Startup Probes","url":"https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/","desc":"All probe types with examples. The HTTP probe section is most relevant for Spring Boot services."},{"type":"Spring docs","name":"Kubernetes Probes with Actuator","url":"https://docs.spring.io/spring-boot/docs/current/reference/html/actuator.html#actuator.endpoints.kubernetes-probes","desc":"How Spring Boot separates liveness and readiness state internally. Required reading before configuring probes."},{"type":"minikube docs","name":"Getting Started","url":"https://minikube.sigs.k8s.io/docs/start/","desc":"Installation and common minikube commands."}],"checklist":["Explained the difference between Pod, ReplicaSet, and Deployment from memory","Applied a Deployment YAML and found the ReplicaSet it created","Deleted a pod and confirmed K8s immediately created a replacement","Created a Service with the correct selector and verified Endpoints listed the Pod IPs","Configured all three probe types in a Deployment YAML correctly","Reproduced the liveness+DB cascading restart failure and explained why it happens"]},{"id":"infra-w11","num":"Week 11","module":"infra","title":"K8s Resources, QoS & Autoscaling","subtitle":"Size services correctly, diagnose OOMKill, and configure HPA — with the probe foundation from Week 10","hours":10,"tagClasses":["tag-infra","tag-time"],"tagLabels":["Cloud/K8s","~10 hours"],"ddia":null,"objectives":["Diagnose OOMKill from incorrect memory limits and calculate the correct JVM memory budget","Understand requests vs limits and why Guaranteed QoS matters in production banking","Configure HPA and observe pod autoscaling under load","Understand why CPU-based HPA is wrong for I/O-bound services"],"diagram":{"type":"k8s-probes","caption":"K8s probe types — the foundation configured in Week 10 that directly affects resource behaviour","intro":"The three probe types from Week 10 interact directly with resource configuration and autoscaling. A liveness probe with a timeout shorter than a GC pause restarts healthy pods. A slow readiness probe delays when newly scaled pods start serving traffic. The diagram below is a reference — make sure you understand each probe's failure action before continuing with resource sizing and HPA."},"setup":{"desc":"Start minikube with the metrics-server addon (required for HPA), then build two versions of your app image to test rolling upgrades.","steps":[{"code":"minikube start --memory=4096 --cpus=4\nminikube addons enable metrics-server\n# Verify metrics-server is ready (takes ~60s)\nkubectl top nodes","lang":"bash"},{"text":"Build v1 and v2 images — use your Dockerfile from Week 9:","code":"eval $(minikube docker-env)\n\n# Build v1\ndocker build -t my-banking-app:v1 .\n\n# Make a trivial change (e.g. edit a log message), then build v2\ndocker build -t my-banking-app:v2 .\n\ndocker images | grep my-banking-app","lang":"bash"}]},"labs":[{"num":1,"title":"Resource sizing — OOMKill, requests vs limits, QoS classes","goal":"Memory misconfiguration is one of the most common platform team problems. Pods restart mysteriously. Logs show nothing. The cause is OOMKill — the kernel silently kills the process when it exceeds its memory limit. Learn to reproduce it, diagnose it, and set limits correctly.","explore":[{"text":"Use the Deployment YAML from Week 10 Lab 3. Edit the resources section to set an intentionally undersized memory limit. Apply it and watch what happens.","code":"# Edit the resources block in your deployment.yaml:\nresources:\n  requests:\n    memory: \"128Mi\"\n    cpu: \"250m\"\n  limits:\n    memory: \"128Mi\"   # Too small for JVM — will cause OOMKill\n    cpu: \"500m\"\n\n# Apply it:\nkubectl apply -f deployment.yaml","lang":"yaml","note":"The pod will start, then get killed shortly after with exit code 137. That code means OOMKill — the Linux kernel killed the process, not K8s itself."},{"text":"Find the OOMKill evidence in the pod description.","code":"kubectl describe pod <pod-name>\n\n# Look for these lines:\n#   Last State: Terminated\n#     Reason: OOMKilled\n#     Exit Code: 137\n#\n# Also check events at the bottom of the output","lang":"bash","note":"OOMKill is silent in application logs — the process never gets a chance to log anything. kubectl describe is the only place to find it."},{"text":"Calculate the correct memory limit for your app. The JVM heap is not the only consumer of memory.","note":"With MaxRAMPercentage=75 and a 512 MB limit, the heap alone is 384 MB — leaving only 128 MB for Metaspace, threads, and buffers. That is too tight for most Spring Boot services. A safer starting point: 768 MB limit. Verify actual usage with: kubectl top pod"},{"text":"Understand QoS classes. Set requests = limits and observe the QoS class assigned.","code":"kubectl get pod <pod-name> -o jsonpath='{.status.qosClass}'\n# Should print: Guaranteed\n\n# If requests < limits:\n# QoS class = Burstable\n# K8s evicts Burstable pods first under node memory pressure","lang":"bash","note":"For production: always Guaranteed (requests = limits). K8s evicts BestEffort first, then Burstable, then Guaranteed."},{"text":"Connect GC config to memory limits. With a 512 MB limit and MaxRAMPercentage=75, a Full GC pause freezes all JVM threads including the HTTP server. If your liveness probe timeoutSeconds is less than the Full GC duration, K8s kills a healthy pod. What is the fix?","note":"Two options: (1) Set liveness probe timeoutSeconds to at least 2× your worst-case GC pause duration — check your GC logs from Week 5. (2) Switch to ZGC which has sub-millisecond pauses and never freezes the HTTP server long enough to fail a probe."}],"hints":[{"label":"Memory limit formula for Spring Boot services","body":"Start with: limit = (desired heap / 0.75). For 512 MB heap: limit = 682 MB, round to 768 MB. Then verify with kubectl top pod under load — if actual usage approaches the limit, increase it. Never set limits below 384 MB for a Spring Boot service with Hibernate and connection pooling."}],"solution":null},{"num":2,"title":"HPA — horizontal pod autoscaling","goal":"The platform team configures HPA for services that need to scale under load. Understand how it works, what metric to use, and the JVM-specific traps that make naive CPU-based HPA dangerous.","explore":[{"text":"Create an HPA targeting CPU utilisation at 50%. Expose the service externally via minikube tunnel, then generate load.","code":"# Create HPA\nkubectl autoscale deployment banking-app   --cpu-percent=50   --min=2   --max=8\n\n# Watch HPA in real time (leave this running)\nkubectl get hpa -w","lang":"bash","note":"In a separate terminal, run the load generator below. Watch TARGETS column — when current% exceeds 50%, HPA adds pods.","os_tabs":[{"os":"macOS / Linux","lang":"bash","code":"# Open a tunnel to the service (separate terminal, leave running):\nkubectl port-forward service/banking-app-svc 8080:80 &\n\n# Generate load:\nab -n 10000 -c 50 http://localhost:8080/actuator/health"},{"os":"Windows (PowerShell)","lang":"bash","code":"# Open a tunnel to the service (separate terminal, leave running):\nkubectl port-forward service/banking-app-svc 8080:80\n\n# Generate load with hey (install: winget install hey):\nhey -n 10000 -c 50 http://localhost:8080/actuator/health"}]},{"text":"Observe scale-down behaviour. After stopping the load, how long does it take for pods to scale back down? Why the delay?","code":"# Stop the load test (Ctrl+C), then watch\nkubectl get hpa -w","lang":"bash","note":"Default scale-down stabilisation window is 300 seconds (5 minutes). This prevents thrashing — if the load was a short spike, you do not want to scale down and then immediately scale back up."},{"text":"Understand why CPU is often the wrong metric for database-heavy services. A service blocked waiting on DB connections or Kafka uses almost zero CPU but is completely saturated. Research KEDA (Kubernetes Event-driven Autoscaling) — it can scale on custom metrics like hikaricp_connections_pending or kafka_consumer_lag.","note":"For a banking payment service that is I/O bound: better HPA targets are HTTP request queue depth, DB connection pool pending count, or Kafka consumer lag. Your job as a backend engineer: expose the right Micrometer metrics so the platform team can configure scaling rules."},{"text":"Connect HPA to readiness probes. A new pod scaled by HPA is not ready to serve traffic until its readiness probe passes. Confirm this: during a scale-up event, check whether the new pod receives requests before it is Ready.","code":"kubectl get endpoints banking-app-svc -w","lang":"bash","note":"The endpoint only appears in the Service once the readiness probe passes. A slow readiness probe delays when scaled pods can help — which can cause HPA to scale even more pods while waiting."}],"hints":[{"label":"HPA with JVM warm-up","body":"JVM services have a warm-up period: JIT compilation runs, caches fill, connection pools establish. For the first 30–60 seconds a new pod handles less load than a warmed pod. Mitigation: configure a preStopHook sleep (3–5s) to let connections drain on scale-down, and tune minReplicas to keep warmed pods available."}],"solution":null}],"refs":[{"type":"K8s docs","name":"Resource Management for Pods","url":"https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/","desc":"Official guide on requests, limits, and QoS classes. Read the QoS section carefully."},{"type":"K8s docs","name":"Horizontal Pod Autoscaling","url":"https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/","desc":"HPA configuration, metrics, and scaling behaviour."},{"type":"KEDA","name":"KEDA — Event-driven Autoscaling","url":"https://keda.sh/docs/latest/concepts/","desc":"Scale on custom metrics like Kafka lag or HTTP queue depth. The right tool for I/O-bound banking services."}],"checklist":["Reproduced OOMKill and found exit code 137 in kubectl describe pod","Calculated correct memory limit using heap + Metaspace + threads + buffers formula","Understood why Guaranteed QoS (requests = limits) is correct for production services","Explained the GC pause + liveness probe interaction and how to fix it","Configured HPA and watched pods scale up under load","Explained why CPU is wrong for DB-bound services and what KEDA solves"]},{"id":"infra-w12","num":"Week 12","module":"infra","title":"Deployment Strategies & DB Migrations","subtitle":"Rolling, blue-green, canary — and which database migration types each strategy supports safely","hours":6,"tagClasses":["tag-infra","tag-time"],"tagLabels":["Cloud/K8s","~6 hours"],"ddia":null,"objectives":["Explain rolling, blue-green, and canary deployment strategies and their tradeoffs","Understand why rolling deployments constrain which DB migrations are safe to run","Apply the expand-contract pattern to safely rename a column in a live system","Classify migration types (add column, rename, drop) as rolling-safe or blue-green-required","Simulate blue-green deployment using slot labels and a Service selector switch"],"diagram":null,"labs":[{"num":1,"title":"Deployment strategies and DB migrations","goal":"Three deployment strategies exist. Your choice of strategy constrains what DB migrations you can run safely. Understanding this is critical for the platform team — a wrong choice causes production incidents.","explore":[{"text":"Deploy V1 first (use the Deployment YAML from Week 10 Lab 3 with image: my-banking-app:v1), then trigger a rolling update to V2 and watch the overlap window.","code":"# Apply with v1 image\nkubectl apply -f deployment.yaml  # image: my-banking-app:v1\nkubectl rollout status deployment/banking-app\n\n# Update to v2 — K8s begins rolling update\nkubectl set image deployment/banking-app   banking-app=my-banking-app:v2\n\n# Watch both v1 and v2 pods running simultaneously\nkubectl get pods -w","lang":"bash","note":"During the overlap window, some requests go to V1 and some to V2. They share the same database. Any migration that V2 runs on startup must not break V1's SQL queries."},{"text":"Research the expand-contract pattern (also called parallel change). This is the only safe way to rename a column or change a type in a system using rolling deployments. Map out the three phases for renaming a column from 'txn_status' to 'status'.","note":"The three phases ensure that at no point does running code reference a column that does not exist — even during a rolling deploy with V1 and V2 simultaneously live. Phase 1 (expand): add new column 'status', V2 writes to both. Phase 2 (contract — once V1 is gone): migrate data, drop old column 'txn_status'."},{"text":"Simulate blue-green by creating two Deployments with a slot label. The Service selector controls which one receives traffic.","code":"# deployment-blue.yaml: copy deployment.yaml from Week 10\n# Add slot: blue to spec.template.metadata.labels\n# Set image to my-banking-app:v1\n\n# deployment-green.yaml: same, but slot: green, image: v2\n\nkubectl apply -f deployment-blue.yaml\nkubectl apply -f deployment-green.yaml\n\n# Point Service at blue\nkubectl patch service banking-app-svc   -p '{\"spec\":{\"selector\":{\"app\":\"banking-app\",\"slot\":\"blue\"}}}'\n\nkubectl get endpoints banking-app-svc\n\n# Switch to green — instant, atomic, no overlap\nkubectl patch service banking-app-svc   -p '{\"spec\":{\"selector\":{\"app\":\"banking-app\",\"slot\":\"green\"}}}'","lang":"bash","note":"Blue-green has no V1/V2 overlap. You can run destructive migrations safely: run the migration while blue is serving traffic, then switch to green. Rollback = patch selector back to blue. Downside: double infrastructure cost during the transition."},{"text":"For each of the following migration types, decide: rolling or blue-green? Explain your reasoning for each. (a) Add a nullable column. (b) Rename a column. (c) Change a column from VARCHAR to TEXT. (d) Add an index (CREATE INDEX CONCURRENTLY). (e) Drop a table.","note":"Answers: (a) Rolling — additive, V1 ignores the new column. (b) Blue-green or expand-contract — V1 breaks if it queries the old name after rename. (c) Depends on DB — in Postgres, VARCHAR to TEXT is a type-compatible change and may be safe rolling. (d) Rolling — CONCURRENTLY does not lock the table. (e) Blue-green only — destructive, V1 will break immediately."}],"hints":[{"label":"Liquibase and rolling deploys","body":"Liquibase acquires a lock in the DATABASECHANGELOCK table before running migrations. In a rolling deploy, multiple pods start simultaneously and all try to run Liquibase. Only one acquires the lock and runs the migration. Others wait, then see the migration already applied and skip it. This is safe — but it means the first pod to start runs migrations before others are ready, so the migration is live before rollout completes. Design migrations accordingly."}],"solution":null}],"refs":[{"type":"Martin Fowler","name":"Parallel Change (expand-contract)","url":"https://martinfowler.com/bliki/ParallelChange.html","desc":"The canonical reference for safe schema changes in a live rolling-deploy system."},{"type":"Martin Fowler","name":"BlueGreenDeployment","url":"https://martinfowler.com/bliki/BlueGreenDeployment.html","desc":"Original article defining blue-green. Short and precise."}],"checklist":["Observed the rolling deployment overlap window with kubectl get pods -w","Applied expand-contract pattern to a column rename scenario","Simulated blue-green with slot labels and an atomic Service selector switch","Correctly classified 5 migration types as rolling-safe or blue-green-required"]},{"id":"infra-w13","num":"Week 13","module":"infra","optional":true,"title":"GitOps, CI/CD Concepts & GC in Production","subtitle":"Understand the deployment pipeline your bank uses — Jenkins, ArgoCD, Helm — and how to tune GC for containerised services","hours":6,"tagClasses":["tag-infra","tag-time"],"tagLabels":["Cloud/K8s","~6 hours · Optional"],"ddia":null,"objectives":["Trace the full deployment flow from code push to running pod at your bank","Explain why :latest image tags break GitOps and what to use instead","Understand why ArgoCD rollback does not undo Liquibase migrations","Connect GC algorithm choice (ZGC vs G1GC) to Kubernetes probe configuration","Know what JVM flags the platform team sets in Kubernetes env vars"],"diagram":null,"labs":[{"num":1,"title":"The GitOps mental model — Jenkins → ArgoCD → Helm","goal":"You do not run helm install in production. ArgoCD does. Understanding this
