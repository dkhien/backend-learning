mental model changes how you think about deployments — a PR to a values file is a production deployment.","optional":true,"explore":[{"text":"Trace the full deployment pipeline for your bank. Map each step to who owns it.","note":"The key insight: you own the code and tests. The pipeline, image registry, and cluster sync are owned by others. Your deployment artifact is a PR to a values file."},{"text":"Understand why :latest is dangerous in a GitOps pipeline.","note":"If your image is tagged :latest: (1) You lose the ability to trace which code version is running in production. (2) If ArgoCD has auto-sync enabled, every image push triggers a deployment with no visibility into what changed. (3) Rollback means nothing — :latest always points to the newest image. Always tag with commit SHA or semantic version."},{"text":"Understand the ArgoCD rollback limitation. ArgoCD can revert a Helm release to a previous values file state (previous image tag). What it cannot do: undo a Liquibase migration that already ran on the new pods.","note":"If V2 pods ran a Liquibase migration that added a NOT NULL column with no default, and you rollback to V1 via ArgoCD, V1 code may fail because it does not handle the new column. The safest recovery: fix forward with a V3 hotfix rather than rollback. This is why backward-compatible migrations (expand-contract) are not optional — they are your rollback plan."},{"text":"Optional hands-on: if you have access to your bank's ArgoCD (ask your team), navigate to the application for a non-production environment. Find: the Git repo it watches, the values file it uses, the current sync status, and the revision history. Do not change anything — just read.","note":"This is optional and depends on access. The goal is connecting the mental model to a real system you will work with."}],"hints":[{"label":"ArgoCD sync policies","body":"Auto-sync: ArgoCD applies any Git change immediately. Used for dev/staging. Manual sync: a human approves the sync in the ArgoCD UI. Used for production at most banks. Your bank likely has manual sync for production Backbase deployments — a PR to the values file requires approval before ArgoCD applies it."}],"solution":null},{"num":2,"title":"JVM and GC configuration in Kubernetes context","goal":"The platform team owns the JVM flags set in K8s environment variables. Understand which flags matter, why they are set the way they are, and how GC choice affects the rest of your K8s config.","optional":true,"explore":[{"text":"Review the standard JVM flags the platform team sets for containerised Spring Boot services and understand each one.","code":"# In K8s Deployment env section:\nenv:\n  - name: JAVA_OPTS\n    value: >-\n      -XX:+UseContainerSupport\n      -XX:MaxRAMPercentage=75.0\n      -XX:+UseZGC\n      -XX:+ZGenerational\n      -Xlog:gc*:file=/var/log/gc.log:time,uptime\n      -XX:+HeapDumpOnOutOfMemoryError\n      -XX:HeapDumpPath=/var/log/heapdump.hprof\n      -Dnetworkaddress.cache.ttl=30","lang":"yaml","note":"Each flag: UseContainerSupport = reads cgroup memory limits. MaxRAMPercentage=75 = heap is 75% of container limit. UseZGC + ZGenerational = low-pause GC. Xlog:gc = write GC log to file. HeapDumpOnOutOfMemoryError = auto-capture heap dump on OOM. networkaddress.cache.ttl=30 = prevents stale DNS after rolling deploys."},{"text":"Connect GC choice to probe configuration. With G1GC, Full GC can pause for hundreds of milliseconds. With ZGC, pauses are sub-millisecond. How does this change your liveness probe timeoutSeconds?","note":"G1GC: set liveness probe timeoutSeconds to at least 2 seconds to survive worst-case Full GC pauses. ZGC: timeoutSeconds of 1 second is sufficient. This is one concrete reason the platform team chooses ZGC for API-facing services — it simplifies probe configuration and eliminates GC-induced probe failures."},{"text":"Research Kubernetes vertical pod autoscaling (VPA) as a tool for right-sizing memory and CPU requests over time. How does VPA differ from HPA? When would you use each?","note":"HPA: scales out (more pods). VPA: scales up (bigger pods, adjusts requests). VPA is useful for right-sizing during the initial deployment phase — it observes actual usage and recommends or automatically adjusts requests/limits. Most teams use VPA in recommendation mode first, then apply values manually."}],"hints":[],"solution":null}],"refs":[{"type":"ArgoCD docs","name":"ArgoCD Introduction","url":"https://argo-cd.readthedocs.io/en/stable/","desc":"Official docs. Read Getting Started and Core Concepts — 30 minutes."},{"type":"Article","name":"GitOps Principles (Weaveworks)","url":"https://www.weave.works/technologies/gitops/","desc":"Original GitOps definition. Explains why Git is the source of truth."},{"type":"K8s docs","name":"Vertical Pod Autoscaler","url":"https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler","desc":"VPA for right-sizing resources over time."}],"checklist":["Can trace the full deployment flow from code push to running pod","Explained why :latest breaks GitOps reproducibility","Understood why ArgoCD rollback does not undo Liquibase migrations — and what this means for your migration strategy","Identified every JVM flag in the standard K8s env block and explained its purpose","Connected GC algorithm choice to liveness probe timeoutSeconds configuration"]}]},{"id":"net","title":"Networking Fundamentals","color":"#0c6652","tagClass":"tag-net","icon":"🌐","desc":"TCP/IP, TLS, and HTTP — what happens between a client request and your Spring Boot controller. Understanding this lets you diagnose latency and connection issues at the network level.","weeks":[{"id":"net-w14","num":"Week 14","module":"net","optional":true,"title":"OSI Layers & TCP/IP Debugging","subtitle":"Map all 7 layers to real tools — diagnose network problems at the right layer","hours":11,"tagClasses":["tag-net","tag-time"],"tagLabels":["Networking","~11 hours"],"ddia":{"chapter":"Chapter 8 — The Trouble with Distributed Systems","note":"Read the 'Unreliable Networks' section before touching any tool this week. It explains why TCP's handshake, retransmission, and timeouts exist — reframing these tools from commands to memorise into responses to fundamental network unreliability."},"objectives":["Map all 7 OSI layers to real protocols, tools, and banking scenarios","Use ping and traceroute/tracert to test Layer 3 (Network) reachability","Use nc (netcat) to test raw Layer 4 (TCP) port connectivity","Use ss/netstat to inspect active connections and their TCP states","Use curl -w to measure DNS, TCP, and TLS costs separately","Use openssl s_client to inspect TLS certificates and handshake","Distinguish connection refused vs timeout — and know what each means for diagnosis"],"diagram":{"type":"osi","caption":"OSI model — every layer, its tools, and its banking relevance","intro":"Network debugging becomes much faster once you know which layer to investigate first. Is the machine reachable at all? (Layer 3 — ping). Is the port open? (Layer 4 — nc/netstat). Is TLS valid? (Layer 6 — openssl). Is the application responding? (Layer 7 — curl). The OSI model gives you a systematic path from physical cable to application logic. The table below maps each layer to the tools you will use this week and the banking-specific scenarios where each layer becomes relevant."},"labs":[{"num":1,"title":"Layer 3 — ping and traceroute","goal":"Ping tests basic IP reachability. Traceroute reveals every router hop on the path. Together they answer: is the host reachable at all, and where is the connection breaking?","setup":{"desc":"Make sure your Postgres container from the database weeks is running.","steps":[{"code":"docker start pg-lab","lang":"bash"}]},"explore":[{"text":"Run ping against localhost and an external host. Focus on three things in the output: the round-trip time (ms), packet loss percentage, and TTL value.","os_tabs":[{"os":"Linux / macOS","lang":"bash","code":"ping -c 5 localhost\nping -c 5 8.8.8.8"},{"os":"Windows","lang":"bash","code":"ping -n 5 localhost\nping -n 5 8.8.8.8"}],"note":"TTL starts at 64 (Linux) or 128 (Windows) and decrements by 1 at each router hop. Packet loss % — any non-zero value means the path is degraded. Round-trip consistency matters: high stddev means an unstable path, not just slow."},{"text":"Run traceroute to see every router hop on the path to a destination. Look for the hop where latency suddenly jumps — that's the network segment adding delay.","os_tabs":[{"os":"Linux","lang":"bash","code":"traceroute 8.8.8.8\ntraceroute -T 8.8.8.8"},{"os":"macOS","lang":"bash","code":"traceroute 8.8.8.8\ntraceroute -I 8.8.8.8"},{"os":"Windows","lang":"bash","code":"tracert 8.8.8.8"}],"note":"* * * on a line means that router ignores probes — not necessarily a broken hop. The path continues. Look for large time jumps between consecutive hops, e.g. hop 5: 2 ms → hop 6: 180 ms. That delta is where latency is introduced. Linux -T uses TCP SYN probes that penetrate more firewalls. macOS -I uses ICMP like Windows tracert."},{"text":"Explore: trace the route to your Postgres Docker container. How many hops? Now trace to an external hostname. In production, traceroute to an external payment gateway when you see connection timeouts — the hop where packets stop is what you report to the infrastructure team."}],"hints":[{"label":"How traceroute works — TTL exploitation","body":"Traceroute sends packets with TTL=1 first. The first router decrements TTL to 0, drops the packet, and sends back ICMP 'Time Exceeded' — revealing hop 1. Then TTL=2 (hop 2 responds), TTL=3 (hop 3 responds), and so on. This is deliberate TTL exhaustion, not magic. It works even without any cooperation from the destination host."}],"solution":null},{"num":2,"title":"Layer 4 — nc (netcat) for raw TCP testing","goal":"Netcat opens a raw TCP connection to any port without needing an application. This isolates network connectivity from application behaviour — critical for answering 'is this a network problem or an application problem?'","explore":[{"text":"Test whether a TCP port is open. Three outcomes are possible: immediate success (port open), immediate refusal (nothing listening), or silence until timeout (firewall dropping packets). Run each command and observe which outcome you get.","os_tabs":[{"os":"Linux / macOS","lang":"bash","code":"nc -zv localhost 5432\nnc -zv localhost 6379\nnc -zv -w 3 localhost 8080"},{"os":"Windows","lang":"bash","code":"Test-NetConnection -ComputerName localhost -Port 5432\nTest-NetConnection -ComputerName localhost -Port 6379"}],"note":"Flags: -z scan without sending data, -v verbose output, -w 3 wait max 3 seconds. Connection refused = something actively rejected (port closed, nothing listening). No response until timeout = firewall silently dropping the packet. These have completely different causes and different fixes."},{"text":"Use nc as a simple echo server to verify end-to-end TCP connectivity between two terminals, without running any real service.","os_tabs":[{"os":"Linux / macOS","lang":"bash","code":"# Terminal 1 — start a listener\nnc -l 8888\n\n# Terminal 2 — connect\nnc localhost 8888"},{"os":"macOS (alternate)","lang":"bash","code":"# Terminal 1\nnc -l -p 8888\n\n# Terminal 2\nnc localhost 8888"},{"os":"Windows","lang":"bash","code":"# Terminal 1 (PowerShell)\n$l = [Net.Sockets.TcpListener]::new(8888)\n$l.Start()\n$c = $l.AcceptTcpClient()\nWrite-Host \"Client connected!\"\n\n# Terminal 2\nTest-NetConnection -ComputerName localhost -Port 8888"}],"note":"Once both terminals are connected, type in Terminal 2 — the text appears in Terminal 1. This proves TCP works end-to-end. Useful pattern: use nc as a stand-in for your real service to confirm the network path is not the problem."},{"text":"Inspect active connections on your machine. When HikariCP connects to Postgres, each pool connection appears here as ESTABLISHED. Find yours.","os_tabs":[{"os":"Linux","lang":"bash","code":"ss -tnp\nss -tnp | grep 5432\nss -tn | awk 'NR>1 {print $1}' | sort | uniq -c"},{"os":"macOS","lang":"bash","code":"netstat -an -p tcp | grep 5432\nlsof -i :5432"},{"os":"Windows","lang":"bash","code":"netstat -ano | findstr :5432\nGet-NetTCPConnection | Where-Object { $_.RemotePort -eq 5432 }"}],"note":"TCP states to understand: ESTABLISHED = active live connection. TIME_WAIT = recently closed, holding ~60 s for delayed packets (normal). CLOSE_WAIT = remote closed but your app has not acknowledged (possible resource leak). If you see many TIME_WAIT connections to Postgres alongside HikariCP timeout errors, that is a sign of connection pool misconfiguration."}],"hints":[{"label":"Connection refused vs timeout — different causes, different fixes","body":"Connection refused arrives as an immediate RST packet. The host is reachable, but nothing is listening on that port. Fix: start the service, or check you have the right port number. Timeout means your SYN packet was dropped with no response at all — a firewall is silently discarding it. Fix: add a firewall rule, check security groups, verify VPN routing. In banking environments, a 30-second connect timeout on a service call is almost always a firewall rule, not a dead server."}],"solution":null},{"num":3,"title":"Layers 6–7 — curl timing and TLS inspection","goal":"curl -w measures each connection phase separately: DNS lookup, TCP connect, TLS handshake, time to first byte. These numbers make the cost of new connections concrete and explain why HikariCP and HTTP keep-alive exist.","explore":[{"text":"Measure each phase of an HTTPS connection using curl's write-out format. The numbers map directly to OSI layers. Run twice — DNS lookup drops to near zero on the second run due to local caching.","os_tabs":[{"os":"Linux / macOS","lang":"bash","code":"curl -s -o /dev/null   -w \"DNS:   %{time_namelookup}s\nTCP:   %{time_connect}s\nTLS:   %{time_appconnect}s\nTTFB:  %{time_starttransfer}s\nTotal: %{time_total}s\nHTTP:  %{http_code}\n\"   https://httpbin.org/get"},{"os":"Windows (cmd)","lang":"bash","code":"curl -s -o NUL ^\n  -w \"DNS:   %%{time_namelookup}s\n\" ^\n  -w \"TCP:   %%{time_connect}s\n\" ^\n  -w \"TLS:   %%{time_appconnect}s\n\" ^\n  -w \"Total: %%{time_total}s\n\" ^\n  https://httpbin.org/get"}],"note":"How to isolate each phase: pure TCP cost = time_connect minus time_namelookup. Pure TLS cost = time_appconnect minus time_connect. Server processing = time_starttransfer minus time_appconnect."},{"text":"Compare TLS 1.2 vs TLS 1.3 handshakes. Run each and look for the Protocol line in the output. TLS 1.3 needs 1 round trip. TLS 1.2 needs 2.","os_tabs":[{"os":"Linux / macOS","lang":"bash","code":"openssl s_client -connect google.com:443 -tls1_3 2>&1   | grep -E \"Protocol|Cipher\"\n\nopenssl s_client -connect google.com:443 -tls1_2 2>&1   | grep -E \"Protocol|Cipher\""},{"os":"Windows (PowerShell)","lang":"bash","code":"$req = [Net.HttpWebRequest]::Create(\"https://google.com\")\n$resp = $req.GetResponse()\n$cert = $req.ServicePoint.Certificate\nWrite-Host \"Subject: $($cert.Subject)\"\nWrite-Host \"Expires: $($cert.GetExpirationDateString())\""}],"note":"At 50 ms datacenter RTT: TLS 1.3 saves 50 ms per new connection compared to TLS 1.2. Multiplied across thousands of microservice calls per second this matters — and it reinforces why connection pooling (which skips the handshake entirely on reuse) is so valuable."},{"text":"Inspect the TLS configuration of your local Postgres container. Does it have TLS enabled? What would an attacker on the same network see if it does not?","os_tabs":[{"os":"Linux / macOS","lang":"bash","code":"openssl s_client   -connect localhost:5432   -starttls postgres 2>&1   | head -20"},{"os":"Windows (Git Bash / WSL)","lang":"bash","code":"openssl s_client   -connect localhost:5432   -starttls postgres 2>&1   | head -20"}]}],"hints":[{"label":"Reading curl -w timing fields","body":"All values are cumulative from request start. time_namelookup = DNS only. time_connect = DNS + TCP. time_appconnect = DNS + TCP + TLS. time_starttransfer = all above + server processing. time_total = everything including download. To isolate each phase: subtract the previous field. Second run DNS drops to near zero — OS cached the result."}],"solution":null}],"refs":[{"type":"Free book","name":"High Performance Browser Networking","url":"https://hpbn.co/","desc":"Chapters 2 (TCP) and 4 (TLS). Best engineer-facing explanations available. Free online."},{"type":"Linux man","name":"ss(8)","url":"https://man7.org/linux/man-pages/man8/ss.8.html","desc":"Full reference for the ss command and output fields."},{"type":"Cloudflare","name":"TLS 1.3 Explained","url":"https://blog.cloudflare.com/rfc-8446-aka-tls-1-3/","desc":"Deep dive with handshake diagrams. Explains round-trip reduction clearly."},{"type":"DDIA","name":"Chapter 8 — Distributed Systems Trouble","url":null,"desc":"Network unreliability and why TCP's reliability mechanisms exist."}],"checklist":["Used ping and traceroute/tracert — interpreted TTL, hop latency, and * * * hops","Distinguished connection refused from timeout using nc/Test-NetConnection","Used nc as a listener to confirm end-to-end TCP connectivity","Found Postgres connections in ss/netstat output as ESTABLISHED","Measured DNS, TCP, and TLS costs separately with curl -w","Compared TLS 1.2 vs 1.3 and identified the round-trip difference","Read HPBN Chapters 2 and 4"]},{"id":"net-w15","num":"Week 15","module":"net","optional":true,"title":"HTTP, DNS & Application-Layer Debugging","subtitle":"curl for HTTP, dig/nslookup for DNS, and fixing the JVM DNS cache in K8s","hours":10,"tagClasses":["tag-net","tag-time"],"tagLabels":["Networking","~10 hours"],"ddia":null,"objectives":["Use curl to send, inspect, and debug HTTP requests at Layer 7","Compare HTTP/1.1 and HTTP/2 timing and understand multiplexing","Trace a full DNS resolution hierarchy with dig/nslookup","Find and fix the JVM DNS cache bug that causes stale routing after K8s rolling upgrades","Understand what HTTP/3 and QUIC solve that HTTP/2 does not"],"diagram":{"type":"http-evolution","caption":"HTTP evolution — eliminating head-of-line blocking at each generation","intro":"HTTP/1.1 sends one request at a time per connection. Browsers work around this by opening 6 parallel connections per domain — wasteful and still limited. HTTP/2 solves this with multiplexing: many logical streams share a single TCP connection. But a single lost TCP packet freezes all HTTP/2 streams until TCP retransmits it — head-of-line blocking at the transport layer. HTTP/3 replaces TCP with QUIC over UDP, giving each stream independent loss recovery. The diagram below shows how each generation handles 3 concurrent requests."},"labs":[{"num":1,"title":"curl for HTTP debugging","goal":"curl is the most important tool for debugging HTTP. The -v flag shows you exactly what was sent and received — headers, status codes, protocol version — without touching any application code.","explore":[{"text":"Run a verbose request and read every section of output. Find the TCP connection line, request headers, response status, and response headers as separate stages.","os_tabs":[{"os":"All platforms","lang":"bash","code":"curl -sv -o /dev/null https://httpbin.org/get 2>&1"}],"note":"In the output: lines starting with * are curl internal events (TCP connect, TLS). Lines starting with > are your request headers. Lines starting with < are the server's response headers. An empty line separates headers from the body."},{"text":"Send a POST request with a JSON body — the same pattern your Spring Boot service uses when calling external payment APIs.","os_tabs":[{"os":"Linux / macOS","lang":"bash","code":"curl -X POST https://httpbin.org/post   -H \"Content-Type: application/json\"   -H \"Authorization: Bearer your-token\"   -d '{\"accountId\": 42, \"amount\": 1000.00}'   | python3 -m json.tool"},{"os":"Windows (cmd)","lang":"bash","code":"curl -X POST https://httpbin.org/post ^\n  -H \"Content-Type: application/json\" ^\n  -d \"{\"accountId\": 42, \"amount\": 1000.00}\""},{"os":"Windows (PowerShell)","lang":"bash","code":"$body = @{ accountId = 42; amount = 1000.00 } | ConvertTo-Json\n$params = @{\n  Uri         = \"https://httpbin.org/post\"\n  Method      = \"POST\"\n  Body        = $body\n  ContentType = \"application/json\"\n}\nInvoke-RestMethod @params"}]},{"text":"Compare HTTP/1.1 vs HTTP/2 for multiple sequential requests. Time both and then confirm which protocol version was negotiated.","os_tabs":[{"os":"Linux / macOS","lang":"bash","code":"time for i in 1 2 3 4 5; do\n  curl -s --http1.1 -o /dev/null https://httpbin.org/get\ndone\n\ntime for i in 1 2 3 4 5; do\n  curl -s --http2 -o /dev/null https://httpbin.org/get\ndone\n\ncurl -sv --http2 -o /dev/null https://httpbin.org/get 2>&1 | grep \"HTTP/\""},{"os":"Windows","lang":"bash","code":"curl --http1.1 -sv -o NUL https://httpbin.org/get 2>&1 | findstr \"HTTP\"\ncurl --http2   -sv -o NUL https://httpbin.org/get 2>&1 | findstr \"HTTP\""}],"note":"HTTP/2 multiplexes requests over one TCP connection — the handshake cost is paid once. HTTP/3 (QUIC, over UDP) goes further: a lost packet on one stream no longer blocks other streams."}],"hints":[{"label":"Common curl flags reference","body":"-X METHOD — HTTP method. -H 'Key: Value' — add header. -d 'body' — request body string. -d @file.json — body from file. -u user:pass — basic auth. -k — skip TLS check (dev only). -L — follow redirects. -v — verbose headers. -s — silent. -o /dev/null — discard body. --http1.1 / --http2 — force protocol. -w 'format' — write-out timing."}],"solution":null},{"num":2,"title":"DNS resolution and the JVM cache trap","goal":"dig traces the full DNS hierarchy from root servers to the authoritative answer. Understanding DNS matters for K8s debugging — particularly the JVM caching bug that causes stale routing after rolling upgrades.","explore":[{"text":"Trace the full DNS resolution hierarchy. Each section in the output is one level of the hierarchy: root → TLD → authoritative nameserver → final answer.","os_tabs":[{"os":"Linux / macOS","lang":"bash","code":"dig +trace google.com\ndig google.com A\ndig @8.8.8.8 google.com A\ndig google.com MX"},{"os":"Windows","lang":"bash","code":"nslookup google.com\nnslookup -type=MX google.com\nResolve-DnsName google.com -Type A\nResolve-DnsName google.com -Server 8.8.8.8"}],"note":"The number before 'IN A' in dig output is TTL in seconds — how long resolvers cache this record. Low TTL = changes propagate fast but more queries. High TTL = slower propagation (problem during migrations and K8s deployments)."},{"text":"Find the JVM DNS cache TTL. This determines how long your Spring Boot service caches an IP before re-resolving. Add this to a @PostConstruct or main() to log the current setting on startup.","code":"System.out.println(\n  \"DNS TTL: \" +\n  java.security.Security.getProperty(\n    \"networkaddress.cache.ttl\"\n  )\n);","lang":"java","note":"null or -1 means the JVM caches DNS results forever. This is dangerous in K8s where pod IPs change on every deployment. Symptom: intermittent 'Connection refused' errors right after a rolling upgrade as requests go to the old dead pod IP."},{"text":"Apply the DNS TTL fix. Add these flags to your JVM startup so the setting is applied before any DNS lookups happen.","os_tabs":[{"os":"Linux / macOS / K8s","lang":"bash","code":"# Add to JVM startup flags:\n-Dnetworkaddress.cache.ttl=30\n-Dnetworkaddress.cache.negative.ttl=5"},{"os":"Windows (IntelliJ VM Options)","lang":"bash","code":"-Dnetworkaddress.cache.ttl=30\n-Dnetworkaddress.cache.negative.ttl=5"}],"note":"30 seconds is safe for K8s rolling upgrades — long enough to avoid hammering DNS, short enough to pick up new pod IPs within one probe cycle. The negative TTL (failed lookups) should be short so a temporary DNS hiccup does not get cached for too long."}],"hints":[{"label":"JVM DNS cache default behaviour","body":"JDK reads networkaddress.cache.ttl from $JAVA_HOME/conf/security/java.security. Default is often -1 (cache forever) or implementation-defined. On newer JDKs it may be 30 seconds by default — check yours with the Security.getProperty call above. Alternative: use a service mesh like Istio which handles routing below the JVM — DNS caching becomes irrelevant because the mesh intercepts all TCP connections."}],"solution":null}],"refs":[{"type":"Free book","name":"HPBN Chapter 12 — HTTP/2","url":"https://hpbn.co/http2/","desc":"Stream multiplexing, flow control, header compression. The definitive explanation."},{"type":"Cloudflare","name":"How DNS Works","url":"https://www.cloudflare.com/learning/dns/what-is-dns/","desc":"Visual DNS resolution walkthrough, recursive resolvers, TTL."},{"type":"Baeldung","name":"Java DNS Cache TTL","url":"https://www.baeldung.com/java-dns-cache-ttl","desc":"JVM DNS caching behaviour and K8s configuration."}],"checklist":["Used curl -v to inspect full request and response headers","Sent a POST with JSON body and confirmed server received it correctly","Compared HTTP/1.1 vs HTTP/2 timing — explained the difference","Traced DNS hierarchy with dig +trace or Resolve-DnsName","Found JVM DNS cache TTL and understood the K8s stale routing risk","Applied -Dnetworkaddress.cache.ttl=30 and verified the setting"]}]},{"id":"design","title":"System Design","color":"#42348c","tagClass":"tag-design","icon":"📐","desc":"Caching, message queues, and CAP theorem. The vocabulary and mental models to reason about architecture decisions — the level expected of a Senior Software Engineer.","weeks":[{"id":"design-w16","num":"Week 16","module":"design","title":"Caching, Message Queues & CAP Theorem","subtitle":"Three concepts you will reference in every architecture discussion","hours":13,"tagClasses":["tag-design","tag-time"],"tagLabels":["System Design","~13 hours"],"ddia":{"chapter":"Chapters 5, 9, 11","note":"Chapter 5 (Replication) for consistency/availability tradeoffs. Chapter 9 (Consistency and Consensus) for CAP theorem. Chapter 11 (Stream Processing) for Kafka, consumer groups, and offset management. Most DDIA-intensive week."},"objectives":["Implement cache-aside pattern with Redis in Spring Boot","Handle Redis failure gracefully — app must not go down when cache is down","Produce and consume Kafka messages with correct key and partition strategy","Explain consumer group partition assignment and what happens when a consumer fails","Articulate CAP theorem with concrete banking examples for the CP vs AP choice"],"diagram":{"type":"cap","caption":"CAP theorem — the real choice is CP vs AP when partitions occur","intro":"In any distributed system, a network partition can occur where two parts of the cluster can't communicate. When that happens, you face a forced choice: refuse requests that can't be guaranteed correct (CP — stay consistent), or return possibly stale data and keep serving (AP — stay available). You cannot be both. CAP theorem formalises this unavoidable tradeoff. For a banking system, the answer differs by data type: account balances demand consistency, while product catalogues can tolerate staleness."},"labs":[{"num":1,"title":"Redis cache-aside — implement and break it","goal":"Implement caching correctly, then deliberately kill Redis and verify your service degrades gracefully rather than crashing.","setup":{"desc":"Start a Redis container and add Spring Cache dependencies.","steps":[{"code":"docker run --name redis-lab -p 6379:6379 -d redis:7-alpine","lang":"bash"},{"text":"Add to pom.xml:","code":"<dependency>\n  <groupId>org.springframework.boot</groupId>\n  <artifactId>spring-boot-starter-data-redis</artifactId>\n</dependency>\n<dependency>\n  <groupId>org.springframework.boot</groupId>\n  <artifactId>spring-boot-starter-cache</artifactId>\n</dependency>","lang":"yaml"},{"text":"application.yml:","code":"spring:\n  cache:\n    type: redis\n    redis:\n      time-to-live: 30s\n  data:\n    redis:\n      host: localhost\n      port: 6379\n      timeout: 2000ms","lang":"yaml"}]},"explore":[{"text":"Add @Cacheable to an account lookup method. Call it twice and verify the second call hits the cache.","reveal":true,"code":"@Service\npublic class AccountService {\n\n    @Cacheable(value = \"accounts\", key = \"#accountId\")\n    public Account getAccount(Long accountId) {\n        log.info(\"DB hit for account {}\", accountId);\n        return accountRepo.findById(accountId).orElseThrow();\n    }\n\n    @CacheEvict(value = \"accounts\", key = \"#account.id\")\n    public Account updateBalance(Account account) {\n        return accountRepo.save(account);\n    }\n}","lang":"java","note":"Watch the logs — 'DB hit' should only appear on the first call. On the second call, the log line should not appear at all (served from cache)."},{"text":"Inspect the cached entry directly in Redis.","code":"redis-cli -h localhost -p 6379\nKEYS *\nTTL accounts::42","lang":"bash","note":"You should see the cache entry with a TTL of 30 seconds."},{"text":"Stop Redis and make a request. Does your app crash or degrade gracefully?","code":"docker stop redis-lab","lang":"bash","note":"Default Spring Cache behaviour: if Redis is down, the cache method throws an exception and the request fails. You need to configure it to fall through to the DB instead."},{"text":"Research: how do you configure Spring Cache to fall through to the underlying method when Redis is unavailable? What is the tradeoff of this approach?"},{"text":"Determine appropriate TTLs: for account balance, for account metadata (name/branch), and for product catalogue. What is the cost of stale data in each case?"}],"hints":[{"label":"Graceful Redis fallback","body":"Add a CacheErrorHandler bean that logs errors but does not rethrow them: @Override public void handleCacheGetError(RuntimeException e, Cache cache, Object key) { log.warn('Cache read error, falling through to DB: {}', e.getMessage()); }. Register it via @Configuration implementing CachingConfigurerSupport. Now cache failures fall through to the real method silently."}],"solution":null},{"num":2,"title":"Kafka — produce, consume, understand partitions","goal":"Set up Kafka and explore partition assignment, message ordering guarantees, and what happens when a consumer goes down — through experimentation, not reading.","setup":{"desc":"Start Kafka in KRaft mode (no ZooKeeper needed).","steps":[{"code":"docker run --name kafka-lab   -e KAFKA_CFG_NODE_ID=0   -e KAFKA_CFG_PROCESS_ROLES=controller,broker   -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093   -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=      CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT   -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093   -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER   -p 9092:9092   -d bitnami/kafka:latest","lang":"bash"},{"text":"Add Spring Kafka dependency:","code":"<dependency>\n  <groupId>org.springframework.kafka</groupId>\n  <artifactId>spring-kafka</artifactId>\n</dependency>","lang":"yaml"}]},"explore":[{"text":"Create a topic with 3 partitions, write a producer using accountId as the message key, and send 30 messages for 10 different accounts.","code":"# Create topic\ndocker exec kafka-lab kafka-topics.sh   --create --topic transaction-events   --partitions 3 --replication-factor 1   --bootstrap-server localhost:9092\n\n# Check which messages went to which partition\ndocker exec kafka-lab kafka-console-consumer.sh   --topic transaction-events   --from-beginning   --property print.partition=true   --bootstrap-server localhost:9092","lang":"bash","note":"All messages for the same accountId should land on the same partition. Verify this. Why does using accountId as the key guarantee this?"},{"text":"Start one consumer in group 'audit-service'. Confirm it consumes all 3 partitions. Then start a second consumer in the same group and observe partition rebalancing.","code":"# Output columns: TOPIC | PARTITION | CURRENT-OFFSET | LOG-END-OFFSET | LAG\n# LAG = messages produced but not yet consumed (0 = consumer is caught up)\ndocker exec kafka-lab kafka-consumer-groups.sh   --describe --group audit-service   --bootstrap-server localhost:9092","lang":"bash","note":"With 3 partitions and 2 consumers: one consumer gets 2 partitions, the other gets 1. With 3 consumers: 1 each. With 4 consumers: one is idle. This is why concurrency in @KafkaListener should equal the partition count."},{"text":"Stop one consumer for 2 minutes. Produce messages during the outage. Restart the consumer. Are the messages there? What does this tell you about Kafka's durability model vs a traditional message queue?"}],"hints":[{"label":"Key → partition routing","body":"Kafka routes messages using: partition = hash(key) % numPartitions. All events with key = '42' always hash to the same partition. Since Kafka guarantees ordering within a partition (not across partitions), using accountId as key guarantees all events for the same account are processed in order. Without a key: messages are round-robined across partitions — no ordering guarantee."}],"solution":null}],"refs":[{"type":"DDIA","name":"Chapter 9 — Consistency and Consensus","url":null,"desc":"The definitive treatment of CAP theorem, linearizability, and what consistency actually means."},{"type":"DDIA","name":"Chapter 11 — Stream Processing","url":null,"desc":"Kafka's design philosophy, log vs queue, consumer offsets, exactly-once semantics."},{"type":"Kafka docs","name":"Kafka Introduction","url":"https://kafka.apache.org/documentation/#gettingStarted","desc":"Topics, partitions, consumer groups, offsets. Read alongside the lab."}],"checklist":["Implemented cache-aside with Redis and verified cache hits via logs","Stopped Redis — confirmed app falls back to DB without crashing","Produced Kafka messages with accountId key — verified partition routing","Observed consumer group rebalance when adding a second consumer","Confirmed message durability — messages consumed after 2-minute consumer outage","Read DDIA Chapters 9 and 11 — can explain CAP with a banking example"]}]}]};

const VIZ = {

  // ── B-tree traversal ─────────────────────────────────────────
  btree(el) {
    el.innerHTML = `
      <div class="viz-btree">
        <div class="viz-title">Click any value to watch the B-tree traversal</div>
        <div class="viz-search-row">
          <span class="viz-label">Search for:</span>
          ${[42, 155, 302, 487, 601].map(v =>
            `<button class="viz-val-btn" onclick="btreeSearch(${v},this)">${v}</button>`
          ).join('')}
        </div>
        <div id="btree-svg-wrap"></div>
        <div id="btree-log" class="viz-log"></div>
      </div>`

    const nodes = {
      root: { label: 'Root', range: [1,700], children: ['b1','b2','b3'], x:300, y:20 },
      b1: { label: '1–200', range: [1,200], children: ['l1','l2'], x:100, y:110 },
      b2: { label: '201–450', range: [201,450], children: ['l3','l4'], x:300, y:110 },
      b3: { label: '451–700', range: [451,700], children: ['l5','l6'], x:500, y:110 },
      l1: { label: '1–100', range: [1,100], children: [], x:40, y:200 },
      l2: { label: '101–200', range: [101,200], children: [], x:140, y:200 },
      l3: { label: '201–325', range: [201,325], children: [], x:240, y:200 },
      l4: { label: '326–450', range: [326,450], children: [], x:340, y:200 },
      l5: { label: '451–570', range: [451,570], children: [], x:440, y:200 },
      l6: { label: '571–700', range: [571,700], children: [], x:540, y:200 },
    }
    window._btreeNodes = nodes

    let svg = `<svg viewBox="0 0 640 295" style="width:100%;font-family:inherit">`
    // Draw edges
    for (const [id, n] of Object.entries(nodes)) {
      for (const c of n.children) {
        const cn = nodes[c]
        svg += `<line x1="${n.x+40}" y1="${n.y+22}" x2="${cn.x+40}" y2="${cn.y}" stroke="var(--border2)" stroke-width="1.5"/>`
      }
    }
    // Draw nodes
    for (const [id, n] of Object.entries(nodes)) {
      const isLeaf = n.children.length === 0
      svg += `<g id="bn-${id}">
        <rect x="${n.x}" y="${n.y}" width="80" height="22" rx="5"
          fill="${isLeaf ? 'var(--green-bg)' : 'var(--blue-bg)'}"
          stroke="${isLeaf ? 'var(--green-lt)' : 'var(--blue-lt)'}" stroke-width="1.5"/>
        <text x="${n.x+40}" y="${n.y+15}" text-anchor="middle"
          font-size="10" fill="${isLeaf ? 'var(--green)' : 'var(--blue)'}" font-weight="600">${n.label}</text>
      </g>`
    }
    // Heap at bottom
    svg += `<g id="bn-heap">
      <rect x="240" y="260" width="120" height="22" rx="5" fill="var(--amber-bg)" stroke="var(--amber-lt)" stroke-width="1.5"/>
      <text x="300" y="275" text-anchor="middle" font-size="10" fill="var(--amber)" font-weight="600">Heap page</text>
    </g>`
    svg += '</svg>'
    document.getElementById('btree-svg-wrap').innerHTML = svg

    window.btreeSearch = function(val, btn) {
      document.querySelectorAll('.viz-val-btn').forEach(b=>b.classList.remove('active'))
      btn.classList.add('active')
      const log = document.getElementById('btree-log')
      const nodes = window._btreeNodes
      // Reset all nodes
      Object.keys(nodes).forEach(id => {
        const el = document.getElementById('bn-'+id)
        if (el) el.style.opacity = '0.3'
      })
      document.getElementById('bn-heap').style.opacity = '0.3'

      const steps = []
      // Find path
      steps.push({id:'root', msg:`Root page: is ${val} in range [1–700]? Yes → check children`})
      let branch = val <= 200 ? 'b1' : val <= 450 ? 'b2' : 'b3'
      steps.push({id:branch, msg:`Branch page ${nodes[branch].label}: is ${val} in this range? Yes → go to leaf`})
      let leaf = Object.entries(nodes).find(([id,n])=> id.startsWith('l') && val >= n.range[0] && val <= n.range[1])
      if (leaf) steps.push({id:leaf[0], msg:`Leaf page ${leaf[1].label}: found pointer to heap page`})
      steps.push({id:'heap', msg:`Heap fetch: read actual row data from disk`})
      steps.push({id:null, msg:`✓ Done in ${steps.length-1} page reads. Seq scan would read ALL ~4400 pages.`})

      let i = 0
      log.innerHTML = ''
      function step() {
        if (i >= steps.length) return
        const s = steps[i++]
        if (s.id) {
          const el = document.getElementById('bn-'+s.id)
          if (el) {
            el.style.opacity = '1'
            el.style.transition = 'opacity 0.3s'
            el.querySelector('rect').style.filter = 'brightness(1.15)'
          }
        }
        const line = document.createElement('div')
        line.className = 'viz-log-line' + (i === steps.length ? ' viz-log-done' : '')
        line.textContent = `Step ${i}: ${s.msg}`
        log.appendChild(line)
        if (i < steps.length) setTimeout(step, 700)
      }
      setTimeout(step, 100)
    }
  },

  // ── GC heap animation ─────────────────────────────────────────
  gc(el) {
    el.innerHTML = `
      <div class="viz-gc">
        <div class="viz-title">Watch how the JVM heap fills and gets collected</div>
        <div class="viz-gc-controls">
          <button class="viz-btn" onclick="gcAllocate()">Allocate objects</button>
          <button class="viz-btn" onclick="gcMinor()">Minor GC</button>
          <button class="viz-btn" onclick="gcFull()">Full GC</button>
          <button class="viz-btn viz-btn-reset" onclick="gcReset()">Reset</button>
        </div>
        <div class="viz-gc-grid">
          <div class="viz-heap-region">
            <div class="viz-region-label">Eden (Young Gen)</div>
            <div class="viz-region-bar" id="gc-eden"><div class="viz-fill" id="gc-eden-fill" style="background:var(--blue)"></div></div>
            <div class="viz-region-pct" id="gc-eden-pct">0%</div>
          </div>
          <div class="viz-heap-region">
            <div class="viz-region-label">Survivor (S0/S1)</div>
            <div class="viz-region-bar" id="gc-surv"><div class="viz-fill" id="gc-surv-fill" style="background:var(--teal)"></div></div>
            <div class="viz-region-pct" id="gc-surv-pct">0%</div>
          </div>
          <div class="viz-heap-region">
            <div class="viz-region-label">Old Gen</div>
            <div class="viz-region-bar" id="gc-old"><div class="viz-fill" id="gc-old-fill" style="background:var(--amber)"></div></div>
            <div class="viz-region-pct" id="gc-old-pct">0%</div>
          </div>
        </div>
        <div id="gc-log" class="viz-log"></div>
      </div>`

    let state = {eden:0, surv:0, old:0, age:0}
    window._gcState = state

    function setBar(id, pct, warn) {
      const fill = document.getElementById(id+'-fill')
      const label = document.getElementById(id+'-pct')
      fill.style.width = Math.min(100,pct)+'%'
      fill.style.background = pct > 85 ? 'var(--red)' : pct > 60 ? 'var(--amber)' : fill.style.background
      label.textContent = Math.round(pct)+'%'
    }
    function log(msg, cls='') {
      const l = document.getElementById('gc-log')
      const d = document.createElement('div')
      d.className = 'viz-log-line ' + cls
      d.textContent = msg
      l.appendChild(d)
      l.scrollTop = l.scrollHeight
    }
    function refresh() {
      setBar('gc-eden', state.eden)
      setBar('gc-surv', state.surv)
      setBar('gc-old', state.old)
    }

    window.gcAllocate = () => {
      state.eden = Math.min(100, state.eden + 20)
      refresh()
      log(`→ Allocated objects: Eden now ${Math.round(state.eden)}%`)
      if (state.eden >= 100) log('⚠ Eden full! Minor GC needed.', 'viz-log-warn')
    }
    window.gcMinor = () => {
      if (state.eden < 20) { log('Eden mostly empty, nothing to collect.'); return }
      const survived = state.eden * 0.15
      const garbage = state.eden - survived
      log(`Minor GC: ${Math.round(garbage)}% garbage collected, ${Math.round(survived)}% objects survived → Survivor`)
      state.eden = 0
      state.surv = Math.min(100, state.surv + survived)
      state.age++
      if (state.age >= 3 && state.surv > 10) {
        const promote = state.surv * 0.5
        state.old = Math.min(100, state.old + promote)
        state.surv -= promote
        log(`Objects aged ${state.age} GC cycles → promoted ${Math.round(promote)}% to Old Gen`, 'viz-log-done')
      }
      refresh()
      if (state.old > 85) log('⚠ Old Gen above 85%! Full GC will be triggered soon.', 'viz-log-warn')
    }
    window.gcFull = () => {
      log('Full GC: stop-the-world pause begins... ALL threads suspended', 'viz-log-warn')
      const freed = state.old * 0.6
      setTimeout(()=>{
        state.old -= freed
        state.surv = state.surv * 0.3
        state.eden = 0
        refresh()
        log(`Full GC complete: freed ${Math.round(freed)}% from Old Gen. Pause = hundreds of ms → API latency spike!`, 'viz-log-warn')
      }, 800)
    }
    window.gcReset = () => {
      state = {eden:0, surv:0, old:0, age:0}
      window._gcState = state
      refresh()
      document.getElementById('gc-log').innerHTML = ''
      log('Reset. Allocate objects to start.')
    }
    log('Click "Allocate objects" repeatedly, then trigger Minor GC when Eden fills.')
  },

  // ── Deadlock visualisation ────────────────────────────────────
  deadlock(el) {
    el.innerHTML = `
      <div class="viz-deadlock">
        <div class="viz-title">Watch two transactions deadlock — step by step</div>
        <div class="viz-dl-controls">
          <button class="viz-btn" id="dl-btn" onclick="dlStep()">▶ Next step</button>
          <button class="viz-btn viz-btn-reset" onclick="dlReset()">Reset</button>
        </div>
        <div class="viz-dl-grid" id="dl-grid"></div>
        <div id="dl-log" class="viz-log"></div>
      </div>`

    const steps = [
      { txA: 'BEGIN', txB: '', lockA: [], lockB: [], waitA: null, waitB: null,
        msg: 'Both transactions start. No locks held yet.' },
      { txA: 'UPDATE account 1\n(lock row 1 ✓)', txB: '', lockA: [1], lockB: [], waitA: null, waitB: null,
        msg: 'Tx A locks row 1. Proceeds normally.' },
      { txA: 'UPDATE account 1\n(lock row 1 ✓)', txB: 'BEGIN\nUPDATE account 2\n(lock row 2 ✓)', lockA: [1], lockB: [2], waitA: null, waitB: null,
        msg: 'Tx B locks row 2. Both hold one lock each.' },
      { txA: 'UPDATE account 1\n(lock row 1 ✓)', txB: 'BEGIN\nUPDATE account 2\n(lock row 2 ✓)\nUPDATE account 1\n⏳ waiting...', lockA: [1], lockB: [2], waitA: null, waitB: 1,
        msg: 'Tx B tries to lock row 1 — blocked by Tx A. Waiting...' },
      { txA: 'UPDATE account 1\n(lock row 1 ✓)\nUPDATE account 2\n⏳ waiting...', txB: 'BEGIN\nUPDATE account 2\n(lock row 2 ✓)\nUPDATE account 1\n⏳ waiting...', lockA: [1], lockB: [2], waitA: 2, waitB: 1,
        msg: 'Tx A tries to lock row 2 — blocked by Tx B. CIRCULAR WAIT = DEADLOCK!' },
      { txA: 'ROLLBACK ✗', txB: 'COMMIT ✓', lockA: [], lockB: [], waitA: null, waitB: null,
        msg: '🔴 Postgres detects deadlock. Rolls back Tx A. Tx B proceeds.' },
      { txA: 'FIX: ORDER BY id\nLock row 1 first ✓', txB: 'FIX: ORDER BY id\nWaiting for row 1...', lockA: [1], lockB: [], waitA: null, waitB: null,
        msg: '✓ Fix: consistent lock ordering. Both sessions lock lower ID first. No circular wait possible.' },
    ]
    let step = 0
    window._dlSteps = steps

    function render(s) {
      document.getElementById('dl-grid').innerHTML = `
        <div class="viz-tx ${s.waitA ? 'viz-tx-wait' : ''} ${s.txA.includes('✗') ? 'viz-tx-dead' : ''} ${s.txA.includes('FIX') ? 'viz-tx-ok' : ''}">
          <div class="viz-tx-label">Transaction A</div>
          <div class="viz-tx-body">${s.txA.replace(/\n/g,'<br>')}</div>
          ${s.lockA.map(r=>`<div class="viz-lock">🔒 Row ${r}</div>`).join('')}
          ${s.waitA ? `<div class="viz-wait">⏳ waiting for row ${s.waitA}</div>` : ''}
        </div>
        <div class="viz-rows">
          <div class="viz-row ${s.lockA.includes(1) ? 'viz-row-locked-a' : ''} ${s.lockB.includes(1) ? 'viz-row-locked-b' : ''}">Row 1<br><span>acct 1</span></div>
          <div class="viz-row ${s.lockA.includes(2) ? 'viz-row-locked-a' : ''} ${s.lockB.includes(2) ? 'viz-row-locked-b' : ''}">Row 2<br><span>acct 2</span></div>
        </div>
        <div class="viz-tx ${s.waitB ? 'viz-tx-wait' : ''} ${s.txB.includes('✓') && s.txA.includes('✗') ? 'viz-tx-ok' : ''} ${s.txB.includes('FIX') ? 'viz-tx-ok' : ''}">
          <div class="viz-tx-label">Transaction B</div>
          <div class="viz-tx-body">${s.txB.replace(/\n/g,'<br>')}</div>
          ${s.lockB.map(r=>`<div class="viz-lock">🔒 Row ${r}</div>`).join('')}
          ${s.waitB ? `<div class="viz-wait">⏳ waiting for row ${s.waitB}</div>` : ''}
        </div>`
      const log = document.getElementById('dl-log')
      const d = document.createElement('div')
      d.className = 'viz-log-line' + (s.msg.includes('🔴') ? ' viz-log-warn' : s.msg.includes('✓ Fix') ? ' viz-log-done' : '')
      d.textContent = `Step ${step}: ${s.msg}`
      log.appendChild(d)
    }

    render(steps[0])
    window.dlStep = () => {
      step = Math.min(step+1, steps.length-1)
      render(steps[step])
      if (step === steps.length-1) document.getElementById('dl-btn').disabled = true
    }
    window.dlReset = () => {
      step = 0
      document.getElementById('dl-btn').disabled = false
      document.getElementById('dl-log').innerHTML = ''
      render(steps[0])
    }
  },

  // ── TCP + TLS handshake ───────────────────────────────────────
  tcp(el) {
    el.innerHTML = `
      <div class="viz-tcp">
        <div class="viz-title">TCP handshake + TLS negotiation — where latency comes from</div>
        <button class="viz-btn" onclick="tcpAnimate()" id="tcp-btn">▶ Animate connection</button>
        <div class="viz-tcp-grid" id="tcp-grid">
          <div class="viz-tcp-side">Client</div>

        <div id="tcp-log" class="viz-log"></div>
      </div>`

    const events = [
      { dir:'→', label:'SYN', y:60, color:'var(--blue)', phase:'TCP', desc:'Client: "I want to connect"' },
      { dir:'←', label:'SYN-ACK', y:100, color:'var(--teal)', phase:'TCP', desc:'Server: "OK, I\'m listening"' },
      { dir:'→', label:'ACK', y:140, color:'var(--blue)', phase:'TCP', desc:'Client: "Connection established" — 1 RTT spent' },
      { dir:'→', label:'ClientHello', y:190, color:'var(--purple)', phase:'TLS', desc:'Client: "Here are my supported cipher suites and key share"' },
      { dir:'←', label:'ServerHello + Cert + Finished', y:240, color:'var(--purple)', phase:'TLS', desc:'Server: "Use this cipher, here\'s my certificate, we\'re done" — TLS 1.3: 1 RTT total' },
      { dir:'→', label:'HTTP Request', y:290, color:'var(--green)', phase:'DATA', desc:'Finally! First actual data — after 2 RTTs of setup' },
      { dir:'←', label:'HTTP Response', y:330, color:'var(--green)', phase:'DATA', desc:'Server responds. Connection reuse skips ALL of the above.' },
    ]

    window.tcpAnimate = function() {
      document.getElementById('tcp-btn').disabled = true
      const log = document.getElementById('tcp-log')
      const legend = document.getElementById('tcp-legend')
      log.innerHTML = ''
      legend.innerHTML = `
        <span class="viz-legend-item" style="color:var(--blue)">■ TCP</span>
        <span class="viz-legend-item" style="color:var(--purple)">■ TLS</span>
        <span class="viz-legend-item" style="color:var(--green)">■ Data</span>`

      const tl = document.getElementById('tcp-timeline')
      // Clear old arrows
      tl.querySelectorAll('.viz-arrow').forEach(a=>a.remove())

      events.forEach((ev, i) => {
        setTimeout(()=>{
          const arrow = document.createElement('div')
          arrow.className = 'viz-arrow'
          arrow.style.cssText = `position:absolute;top:${ev.y}px;left:0;right:0;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:${ev.color}`
          const line = ev.dir === '→'
            ? `<div style="flex:1;height:1.5px;background:${ev.color}"></div><div>▶</div>`
            : `<div>◀</div><div style="flex:1;height:1.5px;background:${ev.color}"></div>`
          arrow.innerHTML = ev.dir === '→'
            ? `<span style="white-space:nowrap">${ev.label}</span>${line}`
            : `${line}<span style="white-space:nowrap">${ev.label}</span>`
          tl.appendChild(arrow)

          const d = document.createElement('div')
          d.className = 'viz-log-line' + (ev.phase==='DATA'?' viz-log-done':'')
          d.innerHTML = `<span style="color:${ev.color};font-weight:700">[${ev.phase}]</span> ${ev.desc}`
          log.appendChild(d)

          if (i === events.length-1) {
            setTimeout(()=>{ document.getElementById('tcp-btn').disabled = false }, 500)
          }
        }, i * 600)
      })
    }
  },

    </div>
    <div id="hpa-log" class="viz-log"></div>
    <div style="margin-top:1rem;padding:10px 14px;background:var(--amber-bg);border:1px solid var(--amber-lt);border-radius:var(--radius);font-size:13px;color:var(--amber)">
      <strong>⚠ CPU-based HPA is wrong for DB-bound services.</strong>
      A banking payment service waiting on DB connections uses &lt;5% CPU — HPA never triggers,
      service is silently saturated. Use KEDA with <code>hikaricp_connections_pending</code> metric instead.
    </div>`

  const phases = [
    { t:0,  cpu:15, pods:2, label:'Normal', color:'var(--green)' },
    { t:1,  cpu:30, pods:2, label:'Load rising', color:'var(--teal)' },
    { t:2,  cpu:62, pods:2, label:'▲ HPA triggers (>50%)', color:'var(--amber)' },
    { t:3,  cpu:55, pods:4, label:'Scaling up…', color:'var(--amber)' },
    { t:4,  cpu:30, pods:4, label:'Load handled', color:'var(--green)' },
    { t:5,  cpu:10, pods:4, label:'Load drops — 5min window starts', color:'var(--blue)' },
    { t:6,  cpu:10, pods:4, label:'Stabilising (5 min)…', color:'var(--blue)' },
    { t:7,  cpu:10, pods:2, label:'▼ Scale down after window', color:'var(--green)' },
  ]

  window.hpaAnimate = function() {
    document.getElementById('hpa-btn').disabled = true
    const cpuLine = document.getElementById('hpa-cpu-line')
    const podLine = document.getElementById('hpa-pod-line')
    const phaseLine = document.getElementById('hpa-phase-line')
    const log = document.getElementById('hpa-log')
    cpuLine.innerHTML = ''
    podLine.innerHTML = ''
    phaseLine.innerHTML = ''
    log.innerHTML = ''
    phases.forEach((p, i) => {
      setTimeout(() => {
        const mkCell = (text, color, bg) => {
          const d = document.createElement('div')
          d.className = 'viz-hpa-cell'
          d.style.cssText = `color:${color};background:${bg||'var(--bg2)'};border-color:${color}40`
          d.textContent = text
          return d
        }
        cpuLine.appendChild(mkCell(p.cpu+'%',
          p.cpu > 50 ? 'var(--red)' : p.cpu > 30 ? 'var(--amber)' : 'var(--green)',
          p.cpu > 50 ? 'var(--red-bg)' : ''))
        podLine.appendChild(mkCell(p.pods+' pods',
          p.pods > 2 ? 'var(--blue)' : 'var(--muted)'))
        phaseLine.appendChild(mkCell(p.label, p.color))
        if (p.label.includes('▲') || p.label.includes('▼') || p.label.includes('window')) {
          const d = document.createElement('div')
          d.className = 'viz-log-line' + (p.label.includes('▲') ? ' viz-log-warn' : p.label.includes('▼') ? ' viz-log-done' : '')
          d.textContent = `t+${i*30}s: ${p.label}`
          log.appendChild(d)
        }
        if (i === phases.length - 1)
          setTimeout(()=>document.getElementById('hpa-btn').disabled=false, 400)
      }, i * 500)
    })
  }
  window.hpaReset = function() {
    ['hpa-cpu-line','hpa-pod-line','hpa-phase-line'].forEach(id=>document.getElementById(id).innerHTML='')
    document.getElementById('hpa-log').innerHTML = ''
    document.getElementById('hpa-btn').disabled = false
  }
}

VIZ.expandcontract = function(el) {
  el.innerHTML = `

    <div class="viz-ec-controls">
      <button class="viz-btn active" onclick="ecShow(0,this)">Phase 1: Expand</button>
      <button class="viz-btn" onclick="ecShow(1,this)">Phase 2: Migrate</button>
      <button class="viz-btn" onclick="ecShow(2,this)">Phase 3: Contract</button>
    </div>
    <div id="ec-content"></div>`

  const phases = [
    {
      title: 'Phase 1 — Expand (deploy V2)',
      desc: 'Add the new column alongside the old one. V2 writes to both. V1 still reads the old column — no breakage.',
      db: [
        { name: 'id', type: 'BIGINT', v1:'read', v2:'read' },
        { name: 'txn_status', type: 'VARCHAR', v1:'read/write', v2:'write only', old: true },
        { name: 'status', type: 'VARCHAR', v1:'ignored', v2:'read/write', new: true },
      ],
      note: 'V1 and V2 can run simultaneously. Rolling deploy is safe.'
    },
    {
      title: 'Phase 2 — Migrate data',
      desc: 'Backfill all rows: UPDATE transactions SET status = txn_status WHERE status IS NULL. Can run as Liquibase migration or background job.',
      db: [
        { name: 'id', type: 'BIGINT', v1:'read', v2:'read' },
        { name: 'txn_status', type: 'VARCHAR', v1:'read', v2:'ignored', old: true },
        { name: 'status', type: 'VARCHAR', v1:'ignored', v2:'read/write', new: true },
      ],
      note: 'All rows now have both columns populated. V2 reads only the new column.'
    },
    {
      title: 'Phase 3 — Contract (deploy V3)',
      desc: 'V3 reads only the new column. Drop the old column once all V2 pods are confirmed gone.',
      db: [
        { name: 'id', type: 'BIGINT', v1:'gone', v2:'read', v3:'read' },
        { name: 'txn_status', type: 'VARCHAR', v1:'gone', v2:'gone', v3:'DROPPED', old: true, dropped: true },
        { name: 'status', type: 'VARCHAR', v1:'gone', v2:'read', v3:'read/write', new: true },
      ],
      note: 'Safe to drop: no running code references txn_status anymore.'

  window.ecShow = function(idx, btn) {

    const p = phases[idx]
    const cols = p.db.map(col => {

      return `<div class="viz-ec-col ${cls}">
        <div class="viz-ec-col-name">${col.name}</div>
        <div class="viz-ec-col-type">${col.type}</div>

      </div>`
    }).join('')
    document.getElementById('ec-content').innerHTML = `
      <div style="font-size:15px;font-weight:700;margin:10px 0 5px">${p.title}</div>
      <div style="font-size:13.5px;color:var(--muted);margin-bottom:12px">${p.desc}</div>
      <div class="viz-ec-table">${cols}</div>
      <div style="margin-top:10px;font-size:13px;color:var(--muted);font-style:italic">${p.note}</div>`
  }
  ecShow(0)
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function tag(cls,label){ return `<span class="tag ${cls}">${label}</span>` }

function callout(type,title,body){
  return `<div class="callout ${type}"><div class="callout-title">${title}</div>${body}</div>`
}

// ── Code block — language sets the dark theme ──
function codeBlock(code, lang){
  const themeMap = {bash:'bash',shell:'bash',sh:'bash',sql:'sql',java:'java',kotlin:'java',yaml:'yaml',yml:'yaml',dockerfile:'dockerfile',output:'output'}
  const theme = themeMap[(lang||'').toLowerCase()] || 'default'
  const label = lang || 'code'
  if (!code) return ''
  return `<div class="code-wrap">
    <div class="code-header ${theme}">${esc(label.toUpperCase())}<button class="copy-btn" onclick="copyCode(this)">copy</button></div>
    <pre class="${theme}"><code>${esc(String(code).trim())}</code></pre>
  </div>`
}

// ── OS-aware tab block ──
function osTabs(id, tabs){
  // tabs = [{os:'Linux/macOS', lang:'bash', code:''}, {os:'Windows', lang:'bash', code:''}]
  const tabBtns = tabs.map((t,i)=>
    `<div class="os-tab${i===0?' active':''}" onclick="switchTab('${id}',${i})">${esc(t.os)}</div>`
  ).join('')
  const panels = tabs.map((t,i)=>
    `<div class="os-tab-panel${i===0?' active':''}" id="${id}-panel-${i}">${codeBlock(t.code, t.lang)}</div>`
  ).join('')
  return `<div class="os-tabs" id="${id}-tabs">${tabBtns}</div>${panels}`
}


// ── Setup block (boilerplate before lab exercises) ──
function setupBlock(setup) {
  if (!setup) return '';
  let html = `<div class="setup-block">
    <div class="setup-block-title">⚙ Setup — run this before starting the lab</div>`;
  if (setup.desc) html += `<p>${setup.desc}</p>`;
  if (setup.steps) {
    setup.steps.forEach(step => {
      if (step.text) html += `<p>${step.text}</p>`;
      if (step.code) html += codeBlock(step.code, step.lang || 'bash');
      if (step.os_tabs) html += osTabs('setup-' + Math.random().toString(36).slice(2,6), step.os_tabs);
    });
  }
  if (setup.code) html += codeBlock(setup.code, setup.lang || 'bash');
  html += '</div>';
  return html;
}

// ── Explore step — each item is {text, code?, lang?, os_tabs?} ──
function revealBlock(code, lang) {
  const id = 'rev-' + Math.random().toString(36).slice(2,8)
  return `<div class="reveal-wrap">
    <button class="reveal-toggle" onclick="toggleReveal(this,'${id}')">
      <span class="rev-icon">👁</span> Show code — write it yourself first
    </button>
    <div class="reveal-body" id="${id}">${codeBlock(code, lang)}</div>
  </div>`
}

function exploreItem(item, idx){
  if (!item || !item.text) return ''
  let inner = `<div class="explore-text">${item.text}</div>`
  if(item.code) {
    inner += item.reveal ? revealBlock(item.code, item.lang||'bash') : codeBlock(item.code, item.lang||'bash')
  }
  if(item.os_tabs) inner += osTabs(`ex-${Math.random().toString(36).slice(2,7)}`, item.os_tabs)
  if(item.note)   inner += `<p style="font-size:13px;color:var(--muted);margin-top:.5rem;font-style:italic">${item.note}</p>`
  return `<li class="explore-item">
    <div class="explore-num">${idx+1}</div>
    <div class="explore-content">${inner}</div>
  </li>`
}

function labHTML(lab, color){
  const explores = (lab.explore||[]).map((e,i)=> exploreItem(typeof e==='string'?{text:e}:e, i)).join('')
  const hints = (lab.hints||[]).map(h=>`
    <button class="hint-toggle" onclick="toggleHint(this)"><span class="arr">▶</span> ${esc(h.label)}</button>
    <div class="hint-body">${h.body}${h.code?codeBlock(h.code,h.lang||'bash'):''}</div>
  `).join('')
  const sol = lab.solution ? `
    <button class="solution-toggle" onclick="toggleSolution(this)">
      📦 Show complete solution — try it yourself first <span class="arr">▼</span>
    </button>
    <div class="solution-body">
      <p class="solution-note">Only look after a genuine attempt.</p>
      ${lab.solution.content ? codeBlock(lab.solution.content, lab.solution.lang||'bash') : ''}
    </div>` : ''

  return `<div class="lab">
    <div class="lab-header" style="background:${color}14;border-color:${color}30">
      <div class="lab-num" style="background:${color}">${lab.num}</div>
      <div class="lab-title">${esc(lab.title)}${lab.optional?'<span class="optional-badge" style="margin-left:8px;font-size:10px">Optional</span>':''}</div>
    </div>
    <div class="lab-body">
      ${lab.goal?`<div class="lab-goal">${esc(lab.goal)}</div>`:''}
      <div class="section-label">Lab steps</div>
      <ul class="explore-list">${explores}</ul>
      ${hints?`<div class="section-label">Hints</div>${hints}`:''}
      ${sol?`<div class="section-label">Solution</div>${sol}`:''}
    </div>
  </div>`
}

function refsHTML(refs){
  if(!refs||!refs.length) return ''
  return `<h3>References</h3><div class="refs">${refs.map(r=>`
    <div class="ref-card">

function buildSidebar(){
  const nav = document.getElementById('sidebar-nav')
  let html = ''
  PLAN.modules.forEach(mod=>{
    html += `<div class="sb-group">
      <div class="sb-group-label" style="color:${mod.color}">${mod.title}</div>`
    mod.weeks.forEach(w=>{
      html += `<a class="sb-item${w.optional?' sb-optional':''}" href="#${w.id}">
        <span class="sb-dot" style="background:${mod.color}${w.optional?';opacity:.55':''}"></span>${w.num} · ${w.title}${w.optional?' <span style="font-size:9px;opacity:.7">(opt)</span>':''}
      </a>`
    })
    html += '</div>'
  })
  nav.innerHTML = html
  // append theme switcher at bottom
  const sw = document.createElement('div')
  sw.className = 'theme-switcher'
  sw.innerHTML = `
    <div class="theme-label">Theme</div>
    <div class="theme-btns">
      <div class="theme-btn slate active" onclick="setTheme('slate',this)">Slate</div>
      <div class="theme-btn pink" onclick="setTheme('pink',this)" id="theme-btn-pink">✿ Pink</div>
      <div class="theme-btn dark" onclick="setTheme('dark',this)">Dark</div>

  document.querySelector('.sidebar').appendChild(sw)
}

// ── Main content ──
function buildContent(){
  const main = document.getElementById('main-content')
  let html = ''
  PLAN.modules.forEach(mod=>{
    mod.weeks.forEach(week=>{
      html += `<div class="section-wrapper" id="${week.id}">`
      // Week header
      html += `<div class="week-header">
        <div class="week-accent" style="background:${mod.color}"></div>
        <div class="week-meta">
          <div class="week-num">${week.num} · ${mod.title}</div>
          <div class="week-title">${esc(week.title)}</div>
          <div class="week-subtitle">${esc(week.subtitle)}</div>
          <div class="week-tags">${week.tagClasses.map((c,i)=>tag(c,week.tagLabels[i])).join('')}${week.optional?'<span class="optional-badge">⭐ Optional — do after rotation starts</span>':''}</div>
        </div>
      </div>`
      // Objectives
      html += `<h3>What you will learn</h3><ul>${week.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>`
      // DDIA
      if(week.ddia) html += callout('ddia',`📖 DDIA — ${week.ddia.chapter}`,`<p>${week.ddia.note}</p>`)
      // Diagram
      if(week.diagram) html += diagramHTML(week.diagram)
      // Setup — supports both old format (label+code) and new format (desc+steps)
      if(week.setup && week.setup.label){
        html += `<h3>${esc(week.setup.label)}</h3>`
        if(week.setup.note) html += `<p>${week.setup.note}</p>`
        if(week.setup.code) html += codeBlock(week.setup.code, week.setup.lang)
      } else if(week.setup){
        html += setupBlock(week.setup)
      }
      if(week.setup2 && week.setup2.label){
        html += `<h4>${esc(week.setup2.label)}</h4>`
        if(week.setup2.code) html += codeBlock(week.setup2.code, week.setup2.lang)
      }
      // Labs
      html += `<h3>Lab exercises</h3>`
      week.labs.forEach(lab=>{ html += labHTML(lab, mod.color) })
      // Refs + checklist
      html += refsHTML(week.refs)
      html += checklistHTML(week.id, week.checklist)
      html += '</div>'
    })
  })
  main.innerHTML = html

  // Mount interactive visualisations
  const vizMap = {
    'db-w1': 'btree',
    'db-w4': 'deadlock',
    'db-w3': 'n1',
    'java-w5': 'gc',
    'spring-w8': 'proxy',
    'net-w14': 'tcp',
    'infra-w11': 'oomkill',
  }
  // Weeks with multiple viz — mount directly
  const multiViz = {
    'infra-w11': ['hpa'],
    'infra-w12': ['deploy', 'expandcontract'],
    'infra-w13': ['gitops'],
  }
  Object.entries(vizMap).forEach(([weekId, type]) => {
    const wrap = document.querySelector('#'+weekId+' .diagram-wrap')
    if (wrap && VIZ[type]) {
      const el = document.createElement('div')
      el.className = 'viz-container'
      wrap.appendChild(el)
      VIZ[type](el)
    }
  })
  // Mount additional viz for weeks with multiple visualisations
  Object.entries(multiViz).forEach(([weekId, types]) => {
    const week = document.getElementById(weekId)
    if (!week) return
    // Find the "Lab exercises" h3 — insert visuals before it
    const allH3 = week.querySelectorAll('h3')
    // Last h3 is "Lab exercises", second-to-last is "References" or similar
    // We want to insert AFTER objectives/ddia/setup, BEFORE labs
    // Find h3 whose text is "Lab exercises"
    let anchor = null
    allH3.forEach(h => { if (h.textContent.trim() === 'Lab exercises') anchor = h })
    types.forEach(type => {
      if (!VIZ[type]) return
      const el = document.createElement('div')
      el.className = 'viz-container'
      if (anchor) anchor.parentNode.insertBefore(el, anchor)
      else week.appendChild(el)
      VIZ[type](el)
    })
  })
}

// ── Overview ──
function buildOverview(){
  const el = document.getElementById('overview-content')
  const cards = PLAN.modules.map(m=>`
    <div class="module-card">
      <div class="module-card-top">
        <div class="module-icon" style="background:${m.color}18;color:${m.color}">${m.icon}</div>
        <h4>${m.title} · ${m.weeks.length} week${m.weeks.length>1?'s':''}</h4>
      </div>
      <p>${esc(m.desc)}</p>
      <div class="module-weeks">${m.weeks.map(w=>w.num+': '+w.title).join(' &middot; ')}</div>
    </div>`).join('')
  const qrefs = PLAN.quality_refs.map(r=>`
    <div class="q-ref"><div class="q-dot"></div>
      <span><strong>${esc(r.name)}</strong> — ${esc(r.note)}</span>
    </div>`).join('')
  el.innerHTML = `
    <h1>${esc(PLAN.meta.title)}</h1>
    <div class="week-tags" style="margin-bottom:1.5rem">
      <span class="tag tag-db">13 weeks</span>
      <span class="tag tag-java">Java / Spring Boot</span>
      <span class="tag tag-infra">Backbase · Banking</span>
    </div>
    <p>${esc(PLAN.meta.context)}</p>
    <h3>Modules</h3><div class="module-grid">${cards}</div>
    <h3>Plan validated against</h3>
    <p style="font-size:14px;color:var(--muted)">Curriculum and lab approach cross-referenced with these widely-respected resources:</p>
    <div class="quality-bar">${qrefs}</div>`
}

// ── Interactions ──
function toggleReveal(btn, id) {
  const body = document.getElementById(id)
  const open = body.classList.toggle('open')
  btn.querySelector('.rev-icon').textContent = open ? '🙈' : '👁'
  btn.querySelector('span:last-child') && (btn.lastChild.textContent = open ? ' Hide' : ' Show code — write it yourself first')
  if (open) btn.innerHTML = '<span class="rev-icon">🙈</span> Hide solution'
  else btn.innerHTML = '<span class="rev-icon">👁</span> Show code — write it yourself first'
}

function toggleHint(btn){
  const body = btn.nextElementSibling
  const open = body.classList.toggle('open')
  btn.classList.toggle('open', open)
  btn.querySelector('.arr').textContent = open ? '▼' : '▶'
}
function toggleSolution(btn){
  const body = btn.nextElementSibling
  const open = body.classList.toggle('open')
  btn.classList.toggle('open', open)
}
function switchTab(id, idx){
  document.querySelectorAll(`#${id}-tabs .os-tab`).forEach((t,i)=>t.classList.toggle('active',i===idx))
  document.querySelectorAll(`[id^="${id}-panel-"]`).forEach((p,i)=>p.classList.toggle('active',i===idx))
}
function copyCode(btn){
  const code = btn.closest('.code-wrap').querySelector('code')
  navigator.clipboard.writeText(code.textContent).then(()=>{
    btn.textContent='copied!'; setTimeout(()=>btn.textContent='copy',1800)
  })
  // Mount additional viz for weeks with multiple visualisations
  Object.entries(multiViz).forEach(([weekId, types]) => {
    const week = document.getElementById(weekId)
    if (!week) return
    // Find the "Lab exercises" h3 — insert visuals before it
    const allH3 = week.querySelectorAll('h3')
    // Last h3 is "Lab exercises", second-to-last is "References" or similar
    // We want to insert AFTER objectives/ddia/setup, BEFORE labs
    // Find h3 whose text is "Lab exercises"
    let anchor = null
    allH3.forEach(h => { if (h.textContent.trim() === 'Lab exercises') anchor = h })
    types.forEach(type => {
      if (!VIZ[type]) return
      const el = document.createElement('div')
      el.className = 'viz-container'
      if (anchor) anchor.parentNode.insertBefore(el, anchor)
      else week.appendChild(el)
      VIZ[type](el)
    })
  })
}

// ── Persist checkboxes ──
const saved = JSON.parse(localStorage.getItem('pe-v3')||'{}')
function initChecks(){
  document.querySelectorAll('.checklist input').forEach(cb=>{
    if(saved[cb.id]) cb.checked=true
    cb.addEventListener('change',()=>{ saved[cb.id]=cb.checked; localStorage.setItem('pe-v3',JSON.stringify(saved)); updateProgress() })
  })
  updateProgress()
}
function updateProgress(){
  const total=document.querySelectorAll('.checklist input').length
  const done=document.querySelectorAll('.checklist input:checked').length
  const el=document.getElementById('sb-progress')
  if(el) el.textContent=`${done}/${total} complete (${Math.round(done/total*100)}%)`
}

// ── Scroll spy ──
function initScrollSpy(){
  const items=document.querySelectorAll('.sb-item[href^="#"]')
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting) items.forEach(n=>n.classList.toggle('active',n.getAttribute('href')==='#'+e.target.id))
    })
  },{threshold:.12,rootMargin:'-70px 0px -65% 0px'})
  document.querySelectorAll('.section-wrapper[id]').forEach(s=>io.observe(s))
}

function bloomParticles(btn) {
  const rect = btn.getBoundingClientRect()
  const cx = rect.left + rect.width / 2
  const cy = rect.top + rect.height / 2
  const flowers = ['🌸']
  const count = 16
  const dur = 850

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div')
    el.textContent = flowers[i % flowers.length]
    const size = 11 + Math.random() * 12
    const angle = (i / count) * 2 * Math.PI + (Math.random() - .5) * .8
    const dist  = 40 + Math.random() * 60
    const tx = Math.cos(angle) * dist
    const ty = Math.sin(angle) * dist - 15
    const rot = (Math.random() - .5) * 360
    const delay = Math.random() * 150

    Object.assign(el.style, {
      position: 'fixed',
      left: cx + 'px',
      top:  cy + 'px',
      fontSize: size + 'px',
      lineHeight: '1',
      pointerEvents: 'none',
      zIndex: '9999',
      userSelect: 'none',
      transform: 'translate(-50%,-50%) scale(0) rotate(0deg)',
      opacity: '1',
      transition: 'none',
      willChange: 'transform,opacity',
    })
    document.body.appendChild(el)

    // Force reflow then animate
    el.getBoundingClientRect()
    setTimeout(() => {
      el.style.transition = `transform ${dur}ms cubic-bezier(.2,.8,.3,1) ${delay}ms, opacity ${dur*0.6}ms ease ${delay + dur*0.35}ms`
      el.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1) rotate(${rot}deg)`
      el.style.opacity = '0'
    }, 10)

    setTimeout(() => el.remove(), dur + delay + 50)
  }
}

function setTheme(name, btn) {
  document.documentElement.setAttribute('data-theme', name === 'slate' ? '' : name)
  if (name === 'slate') document.documentElement.removeAttribute('data-theme')
  localStorage.setItem('pe-theme', name)
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'))
  if (btn) {
    btn.classList.add('active')
    if (name === 'pink') bloomParticles(btn)
  } else {
    const b = document.querySelector('.theme-btn.' + name)
    if (b) b.classList.add('active')
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  buildOverview(); buildSidebar(); buildContent(); initChecks(); initScrollSpy()
  const savedTheme = localStorage.getItem('pe-theme') || 'slate'
  setTheme(savedTheme, null)
})
